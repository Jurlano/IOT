<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CYBER PARK · Mobile System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* CYBERPUNK THEME - MOBILE FIRST */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }

        body {
            background: #0a0c0f;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        /* MAIN MOBILE CONTAINER */
        .cyber-container {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
            background: rgba(10, 12, 18, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3),
                        inset 0 0 20px rgba(0, 255, 255, 0.2);
            border-radius: 32px;
            padding: 20px 16px;
            color: #e0e0ff;
        }

        /* HEADER WITH GLITCH EFFECT */
        .glitch-header {
            text-align: center;
            margin-bottom: 24px;
            position: relative;
        }

        .glitch-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #00ffff;
            text-shadow: 
                3px 3px 0 #ff00ff,
                -3px -3px 0 #ffff00;
            letter-spacing: 4px;
            animation: glitch 3s infinite;
        }

        .glitch-header p {
            color: #00ccaa;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px dashed #ff00ff;
            padding-bottom: 8px;
        }

        @keyframes glitch {
            0%, 100% { transform: skew(0deg, 0deg); opacity: 1; }
            95% { transform: skew(0deg, 0deg); opacity: 1; }
            96% { transform: skew(5deg, 2deg); opacity: 0.8; text-shadow: 5px 2px 0 cyan; }
            97% { transform: skew(-5deg, -2deg); opacity: 0.9; text-shadow: -5px -2px 0 magenta; }
            98% { transform: skew(3deg, 1deg); }
        }

        /* STATUS BAR - NEON */
        .neon-status {
            background: rgba(0, 20, 20, 0.7);
            border: 1px solid #00ffff;
            border-radius: 40px;
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 15px cyan;
        }

        .pulse-dot {
            width: 12px;
            height: 12px;
            background: #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 15px #00ff00;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .stats-rainbow {
            display: flex;
            gap: 16px;
            font-weight: bold;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #11141f;
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid #ff00ff;
        }

        /* MAIN CARDS – PARKING OBJECTS */
        .parking-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 24px 0;
            max-height: 450px;
            overflow-y: auto;
            padding-right: 6px;
            scrollbar-width: thin;
            scrollbar-color: cyan #111;
        }

        .parking-grid::-webkit-scrollbar {
            width: 6px;
        }
        .parking-grid::-webkit-scrollbar-track {
            background: #111;
        }
        .parking-grid::-webkit-scrollbar-thumb {
            background: cyan;
            border-radius: 10px;
            box-shadow: inset 0 0 6px magenta;
        }

        /* CYBER CARD */
        .cyber-card {
            background: rgba(16, 20, 30, 0.95);
            border: 1.5px solid #00ffff;
            border-radius: 24px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(255, 0, 255, 0.2);
            transition: 0.2s;
            backdrop-filter: blur(5px);
        }

        .cyber-card:active {
            transform: scale(0.99);
            border-color: magenta;
        }

        .card-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .slot-icon {
            width: 50px;
            height: 50px;
            background: #0a0e1a;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            border: 2px solid;
            transition: 0.2s;
        }

        .slot-icon.available {
            border-color: cyan;
            color: cyan;
            text-shadow: 0 0 15px cyan;
        }

        .slot-icon.full {
            border-color: magenta;
            color: magenta;
            text-shadow: 0 0 15px magenta;
        }

        .slot-icon.warning {
            border-color: yellow;
            color: yellow;
            text-shadow: 0 0 15px yellow;
        }

        .slot-info h3 {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .slot-info .badge {
            background: #11141f;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            border: 1px solid;
            display: inline-block;
        }

        .badge.available {
            border-color: cyan;
            color: cyan;
        }
        .badge.full {
            border-color: magenta;
            color: magenta;
        }

        .slot-stats {
            text-align: right;
            font-family: 'Courier New', monospace;
        }

        .slot-stats .occupied {
            color: #ff7b9c;
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1;
        }

        .slot-stats .available {
            color: #7bff9c;
            font-size: 1rem;
        }

        /* PROGRESS BAR – CYBER STYLE */
        .capacity-bar {
            margin-top: 8px;
            width: 100%;
            height: 8px;
            background: #222;
            border-radius: 10px;
            border: 1px solid cyan;
        }

        .capacity-fill {
            height: 100%;
            background: linear-gradient(90deg, cyan, magenta);
            border-radius: 10px;
            width: 0%;
            box-shadow: 0 0 10px cyan;
        }

        /* BUTTONS – NEON */
        .cyber-button-group {
            display: flex;
            gap: 15px;
            margin: 20px 0 10px;
        }

        .cyber-button {
            flex: 1;
            background: transparent;
            border: 2px solid cyan;
            color: cyan;
            padding: 16px 0;
            border-radius: 60px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px cyan;
            transition: 0.2s;
        }

        .cyber-button:active {
            background: cyan;
            color: black;
            box-shadow: 0 0 40px cyan;
        }

        .cyber-button.purple {
            border-color: magenta;
            color: magenta;
            box-shadow: 0 0 15px magenta;
        }
        .cyber-button.purple:active {
            background: magenta;
            color: black;
        }

        /* FOOTER */
        .cyber-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.7rem;
            color: #638;
            border-top: 1px dashed cyan;
            padding-top: 12px;
        }

        /* ACTIVITY TICKER */
        .ticker {
            background: #0c0c18;
            border: 1px solid magenta;
            border-radius: 40px;
            padding: 8px 16px;
            margin: 12px 0;
            font-size: 0.8rem;
            color: #bbff00;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            box-shadow: inset 0 0 10px magenta;
        }

        .ticker i {
            color: cyan;
            margin-right: 8px;
        }

        /* LOADER */
        .loader {
            border: 4px solid #11141f;
            border-top: 4px solid cyan;
            border-right: 4px solid magenta;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="cyber-container" id="app">
        <!-- GLITCH HEADER -->
        <div class="glitch-header">
            <h1>CYBER•PARK</h1>
            <p>>> MOBILE NODE v1.0 <<</p>
        </div>

        <!-- LIVE STATUS -->
        <div class="neon-status" id="liveStatus">
            <div class="pulse-dot"></div>
            <span id="statusText">CONNECTING...</span>
            <div class="stats-rainbow">
                <div class="stat-item"><i class="fas fa-car" style="color: cyan;"></i> <span id="totalSpaces">0</span></div>
                <div class="stat-item"><i class="fas fa-times-circle" style="color: magenta;"></i> <span id="totalFull">0</span></div>
            </div>
        </div>

        <!-- ACTIVITY FEED (CYBER TICKER) -->
        <div class="ticker" id="ticker">
            <i class="fas fa-satellite-dish"></i> <span id="tickerMessage">Awaiting data transmission...</span>
        </div>

        <!-- PARKING GRID (DYNAMIC CARDS) -->
        <div class="parking-grid" id="parkingGrid">
            <div class="loader"></div>
        </div>

        <!-- CONTROL BUTTONS (NEON) -->
        <div class="cyber-button-group">
            <button class="cyber-button" id="refreshBtn"><i class="fas fa-sync-alt"></i> SCAN</button>
            <button class="cyber-button purple" id="resetBtn"><i class="fas fa-skull-crossbones"></i> RESET</button>
        </div>

        <!-- FOOTER / DEBUG INFO -->
        <div class="cyber-footer">
            <span id="lastUpdate">--:--:--</span> • <span id="objectCount">0</span> ACTIVE NODES
        </div>
    </div>

    <script>
        // CONFIG – YOUR WORKING API
        const API_URL = 'https://698d3f03b79d1c928ed4ccbd.mockapi.io/parking';

        // Global state
        let parkingData = [];
        let previousData = [];
        let sessionActivity = [];
        let lastTickerMessage = 'System online.';

        // DOM elements
        const gridEl = document.getElementById('parkingGrid');
        const statusText = document.getElementById('statusText');
        const totalSpacesSpan = document.getElementById('totalSpaces');
        const totalFullSpan = document.getElementById('totalFull');
        const tickerSpan = document.getElementById('tickerMessage');
        const lastUpdateSpan = document.getElementById('lastUpdate');
        const objectCountSpan = document.getElementById('objectCount');

        // Helper: show ticker message
        function setTicker(msg, isError = false) {
            lastTickerMessage = msg;
            tickerSpan.innerText = msg;
            if (isError) {
                document.querySelector('.ticker').style.borderColor = 'red';
                document.querySelector('.ticker').style.boxShadow = '0 0 15px red';
            } else {
                document.querySelector('.ticker').style.borderColor = 'magenta';
                document.querySelector('.ticker').style.boxShadow = 'inset 0 0 10px magenta';
            }
        }

        // Update summary stats
        function updateSummary(data) {
            const total = data.length;
            const fullCount = data.filter(item => item.status === 'full').length;
            const totalOccupied = data.reduce((acc, item) => acc + (parseInt(item.occupied) || 0), 0);
            totalSpacesSpan.innerText = totalOccupied;
            totalFullSpan.innerText = fullCount;
            objectCountSpan.innerText = total;
        }

        // Determine icon/color based on available/status
        function getSlotIconClass(item) {
            const available = parseInt(item.available) || 0;
            if (item.status === 'full' || available === 0) return 'full';
            if (available <= 2) return 'warning';  // low availability
            return 'available';
        }

        // Render the parking cards (mobile cyber style)
        function renderCards(data) {
            if (!data || data.length === 0) {
                gridEl.innerHTML = `<div style="color:cyan; text-align:center; padding:30px;"><i class="fas fa-exclamation-triangle"></i> NO DATA</div>`;
                return;
            }

            let html = '';
            data.forEach(item => {
                const occupied = parseInt(item.occupied) || 0;
                const available = parseInt(item.available) || 0;
                const total = occupied + available;
                const fillPercent = total > 0 ? (occupied / total) * 100 : 0;
                const iconClass = getSlotIconClass(item);
                
                // icon based on class
                let iconName = 'fa-parking';
                if (iconClass === 'full') iconName = 'fa-skull-crossbones';
                else if (iconClass === 'warning') iconName = 'fa-exclamation-triangle';
                else iconName = 'fa-charging-station';

                html += `
                    <div class="cyber-card" data-id="${item.id}">
                        <div class="card-left">
                            <div class="slot-icon ${iconClass}">
                                <i class="fas ${iconName}"></i>
                            </div>
                            <div class="slot-info">
                                <h3>NODE #${item.id}</h3>
                                <span class="badge ${iconClass}">${item.status}</span>
                            </div>
                        </div>
                        <div class="slot-stats">
                            <div class="occupied">${occupied}</div>
                            <div class="available">${available} free</div>
                            <div class="capacity-bar">
                                <div class="capacity-fill" style="width:${fillPercent}%;"></div>
                            </div>
                        </div>
                    </div>
                `;
            });

            gridEl.innerHTML = html;

            // Add click listeners to cards (cyber feedback)
            document.querySelectorAll('.cyber-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    const id = card.dataset.id;
                    const item = data.find(d => d.id === id);
                    if (item) {
                        setTicker(`🔍 NODE ${id} | OCC:${item.occupied} AVAIL:${item.available} STATUS:${item.status}`);
                        // flash effect
                        card.style.borderColor = '#ffff00';
                        card.style.boxShadow = '0 0 30px yellow';
                        setTimeout(() => {
                            card.style.borderColor = 'cyan';
                            card.style.boxShadow = '0 0 20px rgba(0, 255, 255, 0.3)';
                        }, 300);
                    }
                });
            });
        }

        // Compare data for changes (cyberpunk log)
        function detectChanges(newData, oldData) {
            if (!oldData || oldData.length === 0) return;

            let changes = [];
            newData.forEach((newItem, index) => {
                if (index < oldData.length) {
                    const oldItem = oldData[index];
                    if (newItem.occupied !== oldItem.occupied || newItem.status !== oldItem.status) {
                        changes.push(`NODE#${newItem.id}: ${oldItem.occupied}→${newItem.occupied}`);
                    }
                }
            });

            if (changes.length > 0) {
                const msg = `⚡ UPDATE: ${changes.slice(0, 2).join(' · ')}${changes.length > 2 ? ' …' : ''}`;
                setTicker(msg);
                sessionActivity.unshift(msg);
                if (sessionActivity.length > 5) sessionActivity.pop();
            } else {
                setTicker(`🟢 ALL STABLE · ${newData.length} NODES`);
            }
        }

        // MAIN FETCH
        async function fetchParkingData() {
            try {
                statusText.innerText = 'SCANNING...';
                setTicker('📡 REQUESTING DATA ...');
                gridEl.innerHTML = `<div class="loader"></div>`;

                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`STATUS ${response.status}`);

                const data = await response.json();
                parkingData = data;

                // Update UI
                updateSummary(data);
                renderCards(data);
                detectChanges(data, previousData);

                // Status & time
                statusText.innerText = 'ONLINE · SECURE';
                document.querySelector('.neon-status').style.borderColor = '#00ffff';
                document.querySelector('.neon-status').style.boxShadow = '0 0 15px cyan';
                lastUpdateSpan.innerText = new Date().toLocaleTimeString();

                // Save for next compare
                previousData = JSON.parse(JSON.stringify(data)); // clone
            } catch (error) {
                console.error(error);
                statusText.innerText = 'ERROR';
                setTicker(`❌ FAILED: ${error.message}`, true);
                gridEl.innerHTML = `<div style="color:magenta; text-align:center; padding:30px;"><i class="fas fa-bug"></i> CONNECTION LOST</div>`;
                document.querySelector('.neon-status').style.borderColor = 'magenta';
                document.querySelector('.neon-status').style.boxShadow = '0 0 15px magenta';
            }
        }

        // Reset session activity (only local)
        function resetSession() {
            if (confirm('⚠️ RESET SESSION? Local data only.')) {
                sessionActivity = [];
                previousData = [];  // force no diff on next fetch
                setTicker('🔄 SESSION RESET · READY');
                fetchParkingData(); // fresh scan
            }
        }

        // Auto refresh every 5 seconds (mobile friendly)
        let interval = setInterval(fetchParkingData, 5000);

        // Initial load
        fetchParkingData();

        // Event listeners for buttons
        document.getElementById('refreshBtn').addEventListener('click', () => {
            fetchParkingData();
            // haptic feedback simulation
            navigator.vibrate ? navigator.vibrate(20) : null;
        });

        document.getElementById('resetBtn').addEventListener('click', resetSession);

        // Cleanup on page unload (for interval)
        window.addEventListener('beforeunload', () => {
            clearInterval(interval);
        });
    </script>
</body>
</html>
