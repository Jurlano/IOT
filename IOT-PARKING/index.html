<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parking Tracker</title>
<style>
  body { font-family: Arial; background:#f2f2f2; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
  .container { background:#fff; padding:30px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.2); text-align:center; width:320px; }
  h1 { color:#00bcd4; margin-bottom:20px; }
  .stat { margin:15px 0; font-size:20px; font-weight:bold; }
  .status { margin-top:20px; font-size:18px; color:red; font-weight:bold; }
  button { background:#00bcd4; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-size:16px; margin-top:20px; }
  button:hover { background:#0097a7; }
</style>
</head>
<body>

<div class="container">
  <h1>⚡ Parking Tracker ⚡</h1>
  <div class="stat">Total Vehicles Inside: <span id="inside">0</span></div>
  <div class="status" id="statusText"></div>
  <button id="refreshBtn" onclick="fetchParkingData()">Refresh Data</button>
</div>

<script>
const API_URL = 'https://698d3f03b79d1c928ed4ccbd.mockapi.io/parking';

async function fetchParkingData() {
  const btn = document.getElementById('refreshBtn');
  const originalContent = btn.innerHTML;
  btn.innerHTML = 'Loading...';
  btn.disabled = true;

  try {
    const response = await fetch(API_URL);
    const data = await response.json();

    let totalInside = 0;

    // Sum all occupied
    data.forEach(entry => {
      totalInside += parseInt(entry.occupied) || 0;
    });

    // Animate the counter
    animateValue('inside', parseInt(document.getElementById('inside').textContent), totalInside);

    // Show full alert only if all lots are full
    const allFull = data.every(e => parseInt(e.available) === 0 || e.status === "full");
    document.getElementById('statusText').textContent = allFull ? '🚨 Parking Full!' : '';

  } catch (err) {
    console.error('Error:', err);
    alert('Failed to fetch parking data');
  } finally {
    btn.innerHTML = originalContent;
    btn.disabled = false;
  }
}

function animateValue(id, start, end) {
  if (start === end) return;
  const obj = document.getElementById(id);
  const range = end - start;
  const duration = 500;
  const startTime = performance.now();

  function update(currentTime) {
    const elapsed = currentTime - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const easeProgress = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(start + range * easeProgress);
    obj.textContent = current;
    if (progress < 1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

// Initial fetch
fetchParkingData();
setInterval(fetchParkingData, 5000);
</script>

</body>
</html>
