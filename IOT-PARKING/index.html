<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3x2 Parking - Simple</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 600px;
      width: 100%;
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }
    .status {
      text-align: center;
      padding: 10px;
      background: #e3f2fd;
      border-radius: 10px;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .counters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }
    .counter {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }
    .counter.entry {
      border-left: 5px solid #28a745;
    }
    .counter.exit {
      border-left: 5px solid #dc3545;
    }
    .counter .label {
      font-size: 14px;
      color: #666;
    }
    .counter .number {
      font-size: 32px;
      font-weight: bold;
      color: #333;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
    }
    .stat .label {
      font-size: 12px;
      color: #666;
    }
    .stat .value {
      font-size: 20px;
      font-weight: bold;
      color: #333;
    }
    .parking-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .slot {
      background: #f8f9fa;
      border: 2px solid #dee2e6;
      border-radius: 10px;
      padding: 15px 5px;
      text-align: center;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .slot.occupied {
      background: #f8d7da;
      border-color: #dc3545;
    }
    .slot.available {
      background: #d4edda;
      border-color: #28a745;
    }
    .slot i {
      font-size: 24px;
      margin-bottom: 5px;
    }
    .slot .id {
      font-weight: bold;
      margin-bottom: 3px;
    }
    .slot .status-text {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 12px;
      color: white;
    }
    .occupied .status-text {
      background: #dc3545;
    }
    .available .status-text {
      background: #28a745;
    }
    .log {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
      max-height: 120px;
      overflow-y: auto;
    }
    .log-title {
      font-weight: bold;
      margin-bottom: 10px;
    }
    .log-entry {
      padding: 5px 0;
      border-bottom: 1px solid #dee2e6;
      display: flex;
      justify-content: space-between;
    }
    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    .refresh {
      background: #007bff;
      color: white;
    }
    .reset {
      background: #6c757d;
      color: white;
    }
    .debug {
      background: #333;
      color: #0f0;
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 12px;
      margin-top: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-parking"></i> 3x2 Parking</h1>

    <!-- Simple status -->
    <div class="status" id="statusDisplay">
      <i class="fas fa-circle-notch fa-spin"></i> Loading...
    </div>

    <!-- Entry/Exit counters -->
    <div class="counters">
      <div class="counter entry">
        <div class="label"><i class="fas fa-sign-in-alt"></i> PUMASOK</div>
        <div class="number" id="entryCount">0</div>
      </div>
      <div class="counter exit">
        <div class="label"><i class="fas fa-sign-out-alt"></i> LUMABAS</div>
        <div class="number" id="exitCount">0</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="label">TOTAL</div>
        <div class="value" id="totalSlots">6</div>
      </div>
      <div class="stat">
        <div class="label">NAKAPARK</div>
        <div class="value" id="occupiedCount">0/6</div>
      </div>
      <div class="stat">
        <div class="label">BAKANTE</div>
        <div class="value" id="availableCount">6/6</div>
      </div>
    </div>

    <!-- 3x2 Parking slots -->
    <div class="parking-grid" id="parkingGrid">
      <!-- Mapupuno ng JavaScript -->
    </div>

    <!-- Activity log -->
    <div class="log" id="activityLog">
      <div class="log-title"><i class="fas fa-history"></i> Activity</div>
      <div id="logList">— walang activity —</div>
    </div>

    <!-- Buttons -->
    <div class="buttons">
      <button class="refresh" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
      <button class="reset" id="resetBtn"><i class="fas fa-redo-alt"></i> Reset</button>
    </div>

    <!-- Debug info (makikita mo to) -->
    <div class="debug" id="debugInfo">
      Naghihintay ng data...
    </div>
  </div>

  <script>
    // Simple at direct na code
    const API_URL = 'https://698d3f03b79d1c928ed4ccbd.mockapi.io/parking';
    
    // Variables
    let previousOccupied = 0;
    let totalEntry = 0;
    let totalExit = 0;
    let activityLog = [];

    // Kunin ang elements
    const debugInfo = document.getElementById('debugInfo');
    const parkingGrid = document.getElementById('parkingGrid');
    const statusDisplay = document.getElementById('statusDisplay');
    const entryCount = document.getElementById('entryCount');
    const exitCount = document.getElementById('exitCount');
    const occupiedCount = document.getElementById('occupiedCount');
    const availableCount = document.getElementById('availableCount');
    const logList = document.getElementById('logList');

    // Function para mag-fetch ng data
    async function fetchData() {
      try {
        debugInfo.innerHTML = '⏳ Kinukuha ang data...';
        statusDisplay.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Loading...';
        
        const response = await fetch(API_URL);
        const data = await response.json();
        
        // Ipakita ang unang 6 na items
        const first6 = data.slice(0, 6);
        
        // I-debug: ipakita ang raw data
        debugInfo.innerHTML = '✓ May data!\n';
        debugInfo.innerHTML += 'Total items: ' + data.length + '\n';
        debugInfo.innerHTML += 'First 6 items:\n';
        first6.forEach((item, i) => {
          debugInfo.innerHTML += `  Slot ${i+1}: ${JSON.stringify(item)}\n`;
        });

        // Bilangin ang occupied
        let occupied = 0;
        first6.forEach(item => {
          // Tingnan kung ano ang status value
          const status = item.status ? item.status.toString().toLowerCase() : '';
          if (status === 'occupied' || status === 'true' || status === '1') {
            occupied++;
          }
        });

        // Check kung may nagbago (para sa entry/exit count)
        if (previousOccupied !== 0) {
          if (occupied > previousOccupied) {
            const diff = occupied - previousOccupied;
            totalEntry += diff;
            addToLog('entry', diff + ' sasakyan pumasok');
          } else if (occupied < previousOccupied) {
            const diff = previousOccupied - occupied;
            totalExit += diff;
            addToLog('exit', diff + ' sasakyan lumabas');
          }
        }

        // I-save ang current state
        previousOccupied = occupied;

        // Update ang display
        updateDisplay(first6, occupied);

      } catch (error) {
        debugInfo.innerHTML = '❌ Error: ' + error.message;
        statusDisplay.innerHTML = '❌ Error sa connection';
      }
    }

    // Function para i-update ang display
    function updateDisplay(slots, occupied) {
      const total = 6;
      const available = total - occupied;

      // Update stats
      entryCount.textContent = totalEntry;
      exitCount.textContent = totalExit;
      occupiedCount.textContent = occupied + '/6';
      availableCount.textContent = available + '/6';
      
      // Update status
      if (available === 0) {
        statusDisplay.innerHTML = '⚠️ PUNO NA! Lahat occupied';
      } else {
        statusDisplay.innerHTML = `✅ ${available} bakante · ${occupied} nakapark`;
      }

      // Update parking grid
      parkingGrid.innerHTML = '';
      
      for (let i = 0; i < total; i++) {
        const slot = slots[i] || { status: 'available' };
        const isOccupied = slot.status ? 
          (slot.status.toString().toLowerCase() === 'occupied' || 
           slot.status.toString().toLowerCase() === 'true' || 
           slot.status === '1') : false;
        
        const slotDiv = document.createElement('div');
        slotDiv.className = `slot ${isOccupied ? 'occupied' : 'available'}`;
        
        slotDiv.innerHTML = `
          <i class="fas ${isOccupied ? 'fa-car' : 'fa-parking'}"></i>
          <div class="id">Slot ${i+1}</div>
          <div class="status-text">${isOccupied ? 'OCCUPIED' : 'AVAILABLE'}</div>
        `;
        
        parkingGrid.appendChild(slotDiv);
      }
    }

    // Function para mag-add sa log
    function addToLog(type, message) {
      const time = new Date().toLocaleTimeString();
      activityLog.unshift({ type, message, time });
      
      // Keep last 5 entries
      if (activityLog.length > 5) {
        activityLog.pop();
      }
      
      // Update log display
      logList.innerHTML = '';
      if (activityLog.length === 0) {
        logList.innerHTML = '— walang activity —';
      } else {
        activityLog.forEach(log => {
          const div = document.createElement('div');
          div.className = 'log-entry';
          div.innerHTML = `
            <span>
              <i class="fas ${log.type === 'entry' ? 'fa-sign-in-alt' : 'fa-sign-out-alt'}" 
                 style="color: ${log.type === 'entry' ? '#28a745' : '#dc3545'}"></i>
              ${log.message}
            </span>
            <span style="color: #999; font-size: 11px;">${log.time}</span>
          `;
          logList.appendChild(div);
        });
      }
    }

    // Reset function
    function resetCounters() {
      totalEntry = 0;
      totalExit = 0;
      previousOccupied = 0;
      activityLog = [];
      
      entryCount.textContent = '0';
      exitCount.textContent = '0';
      logList.innerHTML = '— walang activity —';
      
      // Refresh data
      fetchData();
    }

    // Initial fetch
    fetchData();

    // Auto-refresh every 3 seconds
    setInterval(fetchData, 3000);

    // Button events
    document.getElementById('refreshBtn').addEventListener('click', fetchData);
    document.getElementById('resetBtn').addEventListener('click', resetCounters);

  </script>
</body>
</html>
