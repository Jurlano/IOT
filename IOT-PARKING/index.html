<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PARKING SLOTS · Mobile System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #0b0e14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        /* MOBILE CONTAINER */
        .parking-app {
            max-width: 420px;
            width: 100%;
            background: #151e2a;
            border-radius: 40px 40px 30px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            border: 1px solid #2a3a4a;
        }

        /* HEADER */
        .app-header {
            background: #0f172a;
            padding: 24px 20px 20px;
            color: white;
            border-bottom: 3px solid #3b82f6;
        }

        .app-header h1 {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .app-header h1 i {
            color: #3b82f6;
            background: #1e2b3c;
            padding: 10px;
            border-radius: 20px;
        }

        .header-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            background: #1a2635;
            padding: 15px;
            border-radius: 25px;
        }

        .stat-box {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: #3b82f6;
        }

        .stat-label {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 5px;
        }

        /* QUICK STATUS */
        .live-status {
            background: #1e2a3a;
            margin: 15px 20px;
            padding: 12px 18px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #3b82f6;
        }

        .live-dot {
            width: 12px;
            height: 12px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }

        .live-text {
            color: white;
            font-weight: 500;
            flex: 1;
        }

        .update-time {
            color: #94a3b8;
            font-size: 12px;
        }

        /* PARKING SLOTS GRID */
        .slots-container {
            padding: 0 20px 20px;
        }

        .section-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            color: #3b82f6;
        }

        .slots-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        /* PARKING SLOT CARD */
        .slot-card {
            background: #1a2635;
            border-radius: 25px;
            padding: 20px 12px;
            text-align: center;
            border: 2px solid #2a3a4a;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .slot-card.available {
            border-color: #22c55e;
            background: linear-gradient(145deg, #1a2635, #1e3a2a);
        }

        .slot-card.occupied {
            border-color: #ef4444;
            background: linear-gradient(145deg, #1a2635, #3a1e2a);
        }

        .slot-card.full {
            border-color: #f59e0b;
            background: linear-gradient(145deg, #1a2635, #3a2e1a);
        }

        .slot-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .slot-number {
            font-size: 24px;
            font-weight: 800;
            color: white;
            margin-bottom: 5px;
        }

        .slot-status {
            font-size: 14px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 8px;
        }

        .available .slot-status {
            background: #22c55e;
            color: white;
        }

        .occupied .slot-status {
            background: #ef4444;
            color: white;
        }

        .full .slot-status {
            background: #f59e0b;
            color: white;
        }

        .slot-details {
            margin-top: 10px;
            font-size: 13px;
            color: #94a3b8;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        /* CAR LIST */
        .car-list {
            background: #0f172a;
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
        }

        .car-list h3 {
            color: white;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .car-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .car-item {
            background: #1a2635;
            padding: 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #2a3a4a;
        }

        .car-icon {
            width: 45px;
            height: 45px;
            background: #2a3a4a;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3b82f6;
            font-size: 20px;
        }

        .car-info {
            flex: 1;
        }

        .car-name {
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .car-slot {
            color: #94a3b8;
            font-size: 13px;
            margin-top: 3px;
        }

        .car-status {
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-parked {
            background: #22c55e;
            color: white;
        }

        /* ACTIVITY LOG */
        .activity-log {
            background: #0f172a;
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
        }

        .log-entry {
            background: #1a2635;
            padding: 12px 15px;
            border-radius: 15px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid;
        }

        .log-entry.enter {
            border-left-color: #22c55e;
        }

        .log-entry.exit {
            border-left-color: #ef4444;
        }

        .log-time {
            color: #94a3b8;
            font-size: 11px;
            margin-left: auto;
        }

        /* BUTTONS */
        .action-buttons {
            display: flex;
            gap: 15px;
            padding: 0 20px 20px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-secondary {
            background: #2a3a4a;
            color: white;
        }

        /* DEBUG PANEL (minimal) */
        .debug-info {
            background: #0a0f18;
            padding: 12px 20px;
            color: #4a5a6a;
            font-size: 11px;
            font-family: monospace;
            border-top: 1px solid #2a3a4a;
        }
    </style>
</head>
<body>
    <div class="parking-app">
        <!-- HEADER -->
        <div class="app-header">
            <h1>
                <i class="fas fa-parking"></i>
                PARKING SLOTS
            </h1>
            <div class="header-stats">
                <div class="stat-box">
                    <div class="stat-value" id="totalCars">0</div>
                    <div class="stat-label">CARS PARKED</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="totalSlots">0</div>
                    <div class="stat-label">TOTAL SLOTS</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="availableSlots">0</div>
                    <div class="stat-label">AVAILABLE</div>
                </div>
            </div>
        </div>

        <!-- LIVE STATUS -->
        <div class="live-status">
            <div class="live-dot"></div>
            <div class="live-text" id="statusMessage">System Online</div>
            <div class="update-time" id="lastUpdate">Just now</div>
        </div>

        <!-- MAIN SLOTS DISPLAY -->
        <div class="slots-container">
            <div class="section-title">
                <i class="fas fa-grid-2"></i>
                PARKING SLOTS (1-8)
            </div>
            <div class="slots-grid" id="parkingGrid">
                <!-- Slots will be inserted here -->
            </div>

            <!-- CARS CURRENTLY PARKED -->
            <div class="car-list" id="carListSection">
                <h3>
                    <i class="fas fa-car"></i>
                    PARKED VEHICLES
                </h3>
                <div class="car-items" id="carList">
                    <div class="car-item">
                        <div class="car-icon"><i class="fas fa-car"></i></div>
                        <div class="car-info">
                            <div class="car-name">Loading...</div>
                            <div class="car-slot">Please wait</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RECENT ACTIVITY -->
            <div class="activity-log">
                <h3 style="color: white; margin-bottom: 15px;">
                    <i class="fas fa-clock"></i>
                    RECENT ACTIVITY
                </h3>
                <div id="activityList">
                    <div class="log-entry">
                        <i class="fas fa-circle-info" style="color: #94a3b8;"></i>
                        <span style="color: #94a3b8;">Loading activity...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="action-buttons">
            <button class="btn btn-primary" id="refreshBtn">
                <i class="fas fa-sync-alt"></i> REFRESH
            </button>
            <button class="btn btn-secondary" id="resetBtn">
                <i class="fas fa-undo-alt"></i> RESET
            </button>
        </div>

        <!-- DEBUG INFO (minimal) -->
        <div class="debug-info" id="debugInfo">
            <i class="fas fa-database"></i> Connected to parking system • <span id="objectCount">0</span> records
        </div>
    </div>

    <script>
        const API_URL = 'https://698d3f03b79d1c928ed4ccbd.mockapi.io/parking';
        
        // State
        let parkingData = [];
        let previousData = [];
        let activityLog = [];
        let sessionEnter = 0;
        let sessionExit = 0;

        // DOM Elements
        const parkingGrid = document.getElementById('parkingGrid');
        const carList = document.getElementById('carList');
        const activityList = document.getElementById('activityList');
        const totalCars = document.getElementById('totalCars');
        const totalSlots = document.getElementById('totalSlots');
        const availableSlots = document.getElementById('availableSlots');
        const statusMessage = document.getElementById('statusMessage');
        const lastUpdate = document.getElementById('lastUpdate');
        const objectCount = document.getElementById('objectCount');
        const debugInfo = document.getElementById('debugInfo');

        // Car names for demo (to make it more realistic)
        const carModels = [
            'Toyota Vios', 'Honda Civic', 'Mitsubishi Mirage', 'Ford Ranger',
            'Nissan Navara', 'Hyundai Accent', 'Suzuki Swift', 'Mazda 3',
            'Kia Sportage', 'Isuzu D-Max', 'Honda CR-V', 'Toyota Fortuner'
        ];

        // Helper: Get random car name
        function getRandomCar() {
            return carModels[Math.floor(Math.random() * carModels.length)];
        }

        // Add to activity log
        function addActivity(type, message) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            activityLog.unshift({ type, message, time });
            
            if (activityLog.length > 5) {
                activityLog.pop();
            }
            
            updateActivityDisplay();
        }

        // Update activity display
        function updateActivityDisplay() {
            if (activityLog.length === 0) {
                activityList.innerHTML = '<div class="log-entry"><i class="fas fa-circle-info" style="color: #94a3b8;"></i><span style="color: #94a3b8;">No recent activity</span></div>';
                return;
            }
            
            let html = '';
            activityLog.forEach(log => {
                html += `
                    <div class="log-entry ${log.type}">
                        <i class="fas ${log.type === 'enter' ? 'fa-sign-in-alt' : 'fa-sign-out-alt'}"></i>
                        <span>${log.message}</span>
                        <span class="log-time">${log.time}</span>
                    </div>
                `;
            });
            activityList.innerHTML = html;
        }

        // Render parking slots (as actual parking slots, not nodes)
        function renderSlots(data) {
            if (!data || data.length === 0) {
                parkingGrid.innerHTML = '<div style="grid-column: span 2; text-align: center; color: #94a3b8; padding: 30px;">No parking data available</div>';
                return;
            }

            let html = '';
            let totalCarsCount = 0;
            let totalSlotsCount = 0;
            let availableCount = 0;

            data.forEach((item, index) => {
                const slotNumber = index + 1;
                const occupied = parseInt(item.occupied) || 0;
                const available = parseInt(item.available) || 0;
                const status = item.status || 'available';
                
                // For this demo, we'll show each "object" as a parking slot
                // If occupied > 0, slot is occupied
                const isOccupied = occupied > 0;
                const isFull = status === 'full' || available === 0;
                
                let slotClass = 'available';
                let statusText = 'AVAILABLE';
                let icon = 'fa-parking';
                
                if (isFull) {
                    slotClass = 'full';
                    statusText = 'FULL';
                    icon = 'fa-ban';
                } else if (isOccupied) {
                    slotClass = 'occupied';
                    statusText = 'OCCUPIED';
                    icon = 'fa-car';
                }
                
                // For stats
                if (isOccupied || isFull) totalCarsCount++;
                totalSlotsCount++;
                if (!isOccupied && !isFull) availableCount++;
                
                html += `
                    <div class="slot-card ${slotClass}">
                        <div class="slot-icon"><i class="fas ${icon}"></i></div>
                        <div class="slot-number">SLOT ${slotNumber}</div>
                        <div class="slot-status">${statusText}</div>
                        <div class="slot-details">
                            <span><i class="fas fa-car"></i> ${occupied}</span>
                            <span><i class="fas fa-circle"></i> ${available}</span>
                        </div>
                    </div>
                `;
            });

            parkingGrid.innerHTML = html;
            
            // Update stats
            totalCars.textContent = totalCarsCount;
            totalSlots.textContent = totalSlotsCount;
            availableSlots.textContent = availableCount;
        }

        // Render parked cars list
        function renderCars(data) {
            let carsHtml = '';
            let carsDisplayed = 0;
            
            data.forEach((item, index) => {
                const occupied = parseInt(item.occupied) || 0;
                if (occupied > 0) {
                    // This slot has cars parked
                    const carName = item.listcar || getRandomCar();
                    carsHtml += `
                        <div class="car-item">
                            <div class="car-icon"><i class="fas fa-car"></i></div>
                            <div class="car-info">
                                <div class="car-name">${carName}</div>
                                <div class="car-slot">Slot ${index + 1} • ${occupied} vehicle${occupied > 1 ? 's' : ''}</div>
                            </div>
                            <div class="car-status status-parked">PARKED</div>
                        </div>
                    `;
                    carsDisplayed++;
                }
            });
            
            if (carsDisplayed === 0) {
                carsHtml = '<div class="car-item"><div class="car-icon"><i class="fas fa-car"></i></div><div class="car-info"><div class="car-name">No cars parked</div><div class="car-slot">All slots available</div></div></div>';
            }
            
            carList.innerHTML = carsHtml;
        }

        // Check for changes (cars entering/exiting)
        function detectChanges(newData, oldData) {
            if (!oldData || oldData.length === 0) return;
            
            let enterEvents = 0;
            let exitEvents = 0;
            
            newData.forEach((newItem, index) => {
                if (index < oldData.length) {
                    const oldItem = oldData[index];
                    const newOccupied = parseInt(newItem.occupied) || 0;
                    const oldOccupied = parseInt(oldItem.occupied) || 0;
                    
                    if (newOccupied > oldOccupied) {
                        const diff = newOccupied - oldOccupied;
                        enterEvents += diff;
                        addActivity('enter', `${diff} car(s) entered Slot ${index + 1}`);
                    } else if (newOccupied < oldOccupied) {
                        const diff = oldOccupied - newOccupied;
                        exitEvents += diff;
                        addActivity('exit', `${diff} car(s) exited Slot ${index + 1}`);
                    }
                }
            });
            
            if (enterEvents > 0 || exitEvents > 0) {
                statusMessage.innerHTML = `${enterEvents} entered • ${exitEvents} exited`;
                setTimeout(() => {
                    statusMessage.innerHTML = 'System Online';
                }, 3000);
            }
        }

        // Main fetch function
        async function fetchData() {
            try {
                statusMessage.innerHTML = 'Loading...';
                debugInfo.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i> Fetching parking data...';
                
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Update object count
                objectCount.textContent = data.length;
                
                // Detect changes
                if (previousData.length > 0) {
                    detectChanges(data, previousData);
                }
                
                // Render UI
                renderSlots(data);
                renderCars(data);
                
                // Update status
                statusMessage.innerHTML = 'System Online';
                lastUpdate.innerHTML = 'Just now';
                debugInfo.innerHTML = `<i class="fas fa-check-circle" style="color: #22c55e;"></i> Last updated: ${new Date().toLocaleTimeString()}`;
                
                // Save for next comparison
                previousData = JSON.parse(JSON.stringify(data));
                
            } catch (error) {
                console.error(error);
                statusMessage.innerHTML = 'Connection Error';
                debugInfo.innerHTML = `<i class="fas fa-exclamation-triangle" style="color: #ef4444;"></i> Error: ${error.message}`;
                
                // Show error in grid
                parkingGrid.innerHTML = `<div style="grid-column: span 2; text-align: center; color: #ef4444; padding: 30px;">
                    <i class="fas fa-exclamation-circle" style="font-size: 40px; margin-bottom: 10px;"></i><br>
                    Failed to load parking data
                </div>`;
            }
        }

        // Reset session
        function resetSession() {
            if (confirm('Reset activity log?')) {
                activityLog = [];
                updateActivityDisplay();
                addActivity('enter', 'Session reset');
                statusMessage.innerHTML = 'Session Reset';
                debugInfo.innerHTML = '<i class="fas fa-undo-alt"></i> Session reset';
            }
        }

        // Initial fetch
        fetchData();
        
        // Auto-refresh every 5 seconds
        setInterval(fetchData, 5000);
        
        // Event listeners
        document.getElementById('refreshBtn').addEventListener('click', fetchData);
        document.getElementById('resetBtn').addEventListener('click', resetSession);

        // Add initial activity
        setTimeout(() => {
            addActivity('enter', 'System initialized');
        }, 1000);
    </script>
</body>
</html>
