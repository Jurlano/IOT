<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3x2 parking · 6 slots entry/exit tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #e9f0f9 0%, #f5f9ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .glass-panel {
      max-width: 550px;
      width: 100%;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 1.8rem 1.5rem;
      box-shadow: 0 30px 60px -20px rgba(0, 40, 80, 0.35),
                  inset 0 1px 2px rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.5);
    }

    h1 {
      font-weight: 600;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #112b3f;
      margin-bottom: 0.8rem;
    }

    h1 i {
      background: #1e4f6b;
      color: white;
      padding: 10px;
      border-radius: 30px;
      font-size: 1.3rem;
      box-shadow: 0 8px 18px -6px #1e4f6b70;
    }

    .status-badge {
      text-align: center;
      font-size: 1rem;
      font-weight: 500;
      padding: 0.6rem 1.2rem;
      border-radius: 100px;
      width: fit-content;
      margin: 0.3rem auto 1.2rem auto;
      background: #edf6fc;
      color: #0b4b6b;
      border: 1px solid #c2dcf0;
      box-shadow: 0 2px 8px rgba(0,50,80,0.05);
      transition: all 0.2s ease;
    }

    .status-badge i {
      margin-right: 6px;
      font-size: 1rem;
    }

    .status-badge.warning {
      background: #ffecdd;
      color: #ac3800;
      border-color: #ffb68b;
    }

    .entry-exit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .counter-card {
      background: linear-gradient(145deg, #ffffff, #f5f9ff);
      border-radius: 24px;
      padding: 1.2rem;
      text-align: center;
      border: 1px solid rgba(30, 79, 107, 0.2);
      box-shadow: 0 10px 20px -10px rgba(0,80,120,0.2);
    }

    .counter-card.entry {
      border-left: 6px solid #4caf50;
    }

    .counter-card.exit {
      border-left: 6px solid #f44336;
    }

    .counter-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #1e4f6b;
      margin-bottom: 0.3rem;
    }

    .counter-label i {
      margin-right: 6px;
    }

    .counter-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: #112b3f;
      line-height: 1.2;
    }

    .counter-sub {
      font-size: 0.8rem;
      color: #608a9f;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: white;
      border-radius: 20px;
      padding: 1rem 0.5rem;
      text-align: center;
      box-shadow: 0 15px 30px -12px rgba(21, 50, 80, 0.15);
      border: 1px solid rgba(0,150,200,0.15);
    }

    .stat-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 600;
      color: #42758e;
      margin-bottom: 0.3rem;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0f3b4f;
      line-height: 1.2;
    }

    .stat-value small {
      font-size: 0.8rem;
      font-weight: 400;
      color: #608a9f;
    }

    .parking-container {
      background: rgba(255,255,255,0.6);
      border-radius: 28px;
      padding: 1.5rem;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.02), 0 8px 20px -12px #265e7a;
      margin-bottom: 1.5rem;
    }

    .parking-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
    }

    .slot-count {
      background: #1e4f6b;
      color: white;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-size: 0.8rem;
    }

    .parking-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .parking-slot {
      background: #f8fafc;
      border-radius: 16px;
      padding: 1.2rem 0.5rem;
      text-align: center;
      border: 2px solid #e2edf5;
      transition: all 0.2s ease;
      cursor: pointer;
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .parking-slot:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0,100,150,0.15);
    }

    .parking-slot.occupied {
      background: linear-gradient(145deg, #fff1f0, #ffe7e3);
      border-color: #f44336;
    }

    .parking-slot.available {
      background: linear-gradient(145deg, #f0faf5, #e6f3ec);
      border-color: #4caf50;
    }

    .slot-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .occupied .slot-icon {
      color: #f44336;
    }

    .available .slot-icon {
      color: #4caf50;
    }

    .slot-id {
      font-size: 1rem;
      font-weight: 700;
      color: #1e4f6b;
      margin-bottom: 0.3rem;
    }

    .slot-status {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 30px;
      display: inline-block;
      text-transform: uppercase;
    }

    .occupied .slot-status {
      background: #f44336;
      color: white;
    }

    .available .slot-status {
      background: #4caf50;
      color: white;
    }

    .activity-log {
      background: white;
      border-radius: 20px;
      padding: 1rem;
      max-height: 140px;
      overflow-y: auto;
      font-size: 0.8rem;
      border: 1px solid #e2edf5;
    }

    .log-title {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #1e4f6b;
    }

    .log-entry {
      padding: 0.3rem 0;
      border-bottom: 1px dashed #e2edf5;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .log-entry.entry {
      color: #4caf50;
    }

    .log-entry.exit {
      color: #f44336;
    }

    .log-time {
      color: #888;
      font-size: 0.7rem;
      margin-left: auto;
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.2rem;
    }

    .modern-btn {
      background: white;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #145c7a;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 8px 18px -6px #173f5730, 0 0 0 1px #b9d7ea inset;
      transition: all 0.2s ease;
    }

    .modern-btn i {
      font-size: 1rem;
      color: #3184a8;
    }

    .modern-btn:hover {
      background: #edf7fd;
      box-shadow: 0 12px 24px -8px #1f5979, 0 0 0 1px #7bc0db inset;
      transform: scale(1.02);
    }

    .modern-btn:active {
      transform: scale(0.98);
    }

    .modern-btn.reset {
      background: #fff4f0;
      color: #ac3800;
    }

    .modern-btn.reset i {
      color: #ac3800;
    }

    .live-badge {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #34b56f;
      border-radius: 50%;
      margin-right: 4px;
      box-shadow: 0 0 0 2px #a3e0c0;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }

    .footer-note {
      text-align: center;
      font-size: 0.7rem;
      color: #5e849c;
      margin-top: 1rem;
      border-top: 1px dashed #c1dae9;
      padding-top: 0.8rem;
      opacity: 0.7;
    }

    .row-label {
      grid-column: span 3;
      font-size: 0.9rem;
      font-weight: 600;
      color: #1e4f6b;
      margin-top: 0.5rem;
      margin-bottom: 0.2rem;
    }

    .row-label:first-of-type {
      margin-top: 0;
    }
  </style>
</head>
<body>
<div class="glass-panel">
  <h1>
    <i class="fas fa-square-parking"></i> 
    3x2 parking
    <i class="fas fa-chart-simple" style="background:transparent; color:#1e4f6b; box-shadow:none;"></i>
  </h1>

  <div class="status-badge" id="statusBadge">
    <i class="fas fa-circle-check"></i> <span id="statusMessage">nagbabasa ng mockapi...</span>
  </div>

  <!-- Entry/Exit Counters -->
  <div class="entry-exit-grid">
    <div class="counter-card entry">
      <div class="counter-label">
        <i class="fas fa-sign-in-alt"></i> PUMASOK
      </div>
      <div class="counter-value" id="totalEntry">0</div>
      <div class="counter-sub">kabuuang pumasok</div>
    </div>
    <div class="counter-card exit">
      <div class="counter-label">
        <i class="fas fa-sign-out-alt"></i> LUMABAS
      </div>
      <div class="counter-value" id="totalExit">0</div>
      <div class="counter-sub">kabuuang lumabas</div>
    </div>
  </div>

  <!-- Current Status -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label"><i class="fas fa-layer-group"></i> total</div>
      <div class="stat-value" id="totalSlots">6</div>
    </div>
    <div class="stat-card">
      <div class="stat-label"><i class="fas fa-car-side"></i> nakapark</div>
      <div class="stat-value" id="occupiedSlots">0 <small>/6</small></div>
    </div>
    <div class="stat-card">
      <div class="stat-label"><i class="fas fa-arrow-circle-up"></i> bakante</div>
      <div class="stat-value" id="availableSlots">0 <small>/6</small></div>
    </div>
  </div>

  <!-- 3x2 Parking Grid (6 slots) -->
  <div class="parking-container">
    <div class="parking-title">
      <div><i class="fas fa-grid-2"></i> 3x2 Parking (6 slots)</div>
      <div class="slot-count"><i class="fas fa-car"></i> 6 slots</div>
    </div>
    
    <div class="parking-grid" id="parkingGrid">
      <!-- 6 slots will be inserted here -->
    </div>
  </div>

  <!-- Activity Log -->
  <div class="activity-log" id="activityLog">
    <div class="log-title"><i class="fas fa-history"></i> Kamakailang Activity</div>
    <div id="logEntries"></div>
  </div>

  <!-- Buttons -->
  <div class="button-group">
    <button class="modern-btn" id="refreshBtn">
      <i class="fas fa-sync-alt"></i> i-update
      <span class="live-badge"></span>
    </button>
    <button class="modern-btn reset" id="resetBtn">
      <i class="fas fa-redo-alt"></i> reset counters
    </button>
  </div>

  <div class="footer-note">
    <i class="fas fa-database"></i> 3x2 = 6 slots · base sa mockapi · binibilang ang pumasok at lumabas
  </div>
</div>

<script>
  (function() {
    const API_URL = "https://698d3f03b79d1c928ed4ccbd.mockapi.io/parking";

    // DOM elements
    const parkingGrid = document.getElementById("parkingGrid");
    const totalSpan = document.getElementById("totalSlots");
    const occupiedSpan = document.getElementById("occupiedSlots");
    const availableSpan = document.getElementById("availableSlots");
    const totalEntrySpan = document.getElementById("totalEntry");
    const totalExitSpan = document.getElementById("totalExit");
    const statusBadge = document.getElementById("statusBadge");
    const statusMessage = document.getElementById("statusMessage");
    const logEntries = document.getElementById("logEntries");
    const refreshBtn = document.getElementById("refreshBtn");
    const resetBtn = document.getElementById("resetBtn");

    // 3x2 = 6 slots
    const TOTAL_SLOTS = 6;

    // Store previous state
    let previousOccupied = 0;
    let totalEntry = 0;
    let totalExit = 0;
    let activityLog = [];

    // Helper: add to activity log
    function addToLog(action, details) {
      const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      
      activityLog.unshift({
        time,
        action,
        details
      });
      
      // Keep only last 6 entries
      if (activityLog.length > 6) {
        activityLog.pop();
      }
      
      // Update log display
      logEntries.innerHTML = '';
      
      if (activityLog.length === 0) {
        logEntries.innerHTML = '<div style="color:#888; text-align:center; padding:0.5rem;">— walang activity —</div>';
        return;
      }
      
      activityLog.forEach(log => {
        const logDiv = document.createElement('div');
        logDiv.className = `log-entry ${log.action}`;
        
        let icon = log.action === 'entry' ? 'fa-sign-in-alt' : 'fa-sign-out-alt';
        let text = log.action === 'entry' ? 'Pumasok' : 'Lumabas';
        
        logDiv.innerHTML = `
          <i class="fas ${icon}"></i>
          <span>${text} ${log.details}</span>
          <span class="log-time">${log.time}</span>
        `;
        logEntries.appendChild(logDiv);
      });
    }

    // Helper: create parking slot element
    function createParkingSlot(slotData, slotNumber) {
      const isOccupied = slotData && slotData.status && slotData.status.toLowerCase() === 'occupied';
      
      const slotDiv = document.createElement('div');
      slotDiv.className = `parking-slot ${isOccupied ? 'occupied' : 'available'}`;
      
      slotDiv.innerHTML = `
        <div class="slot-icon">
          <i class="fas ${isOccupied ? 'fa-car' : 'fa-parking'}"></i>
        </div>
        <div class="slot-id">Slot ${slotNumber}</div>
        <div class="slot-status">${isOccupied ? 'occupied' : 'available'}</div>
      `;
      
      // Click to show info
      slotDiv.addEventListener('click', () => {
        alert(`Slot ${slotNumber}\nStatus: ${isOccupied ? 'Occupied' : 'Available'}`);
      });
      
      return slotDiv;
    }

    // Main fetch function
    async function fetchParkingData() {
      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error('Network error');
        
        const data = await response.json();
        
        // Kunin lang ang unang 6 na slots (3x2)
        const first6Slots = data.slice(0, TOTAL_SLOTS);
        
        // Bilangin kung ilan ang occupied
        let currentOccupied = 0;
        first6Slots.forEach(slot => {
          if (slot.status && slot.status.toLowerCase() === 'occupied') {
            currentOccupied++;
          }
        });
        
        // Check kung may nagbago compared sa previous (skip sa first load)
        if (previousOccupied !== 0) {
          if (currentOccupied > previousOccupied) {
            // May pumasok
            const diff = currentOccupied - previousOccupied;
            totalEntry += diff;
            addToLog('entry', `${diff} sasakyan`);
          } else if (currentOccupied < previousOccupied) {
            // May lumabas
            const diff = previousOccupied - currentOccupied;
            totalExit += diff;
            addToLog('exit', `${diff} sasakyan`);
          }
        }
        
        // Update previous state
        previousOccupied = currentOccupied;
        
        // Compute available
        const currentAvailable = TOTAL_SLOTS - currentOccupied;
        
        // Update UI
        totalSpan.innerText = TOTAL_SLOTS;
        occupiedSpan.innerHTML = `${currentOccupied} <small>/ ${TOTAL_SLOTS}</small>`;
        availableSpan.innerHTML = `${currentAvailable} <small>/ ${TOTAL_SLOTS}</small>`;
        totalEntrySpan.innerText = totalEntry;
        totalExitSpan.innerText = totalExit;
        
        // Update status badge
        if (currentAvailable === 0) {
          statusBadge.classList.add('warning');
          statusMessage.innerHTML = '⚠️ Puno na! 6/6 occupied';
        } else {
          statusBadge.classList.remove('warning');
          statusMessage.innerHTML = `✓ ${currentAvailable} bakante · ${currentOccupied} nakapark`;
        }
        
        // Update parking grid
        parkingGrid.innerHTML = '';
        
        // Create 3x2 grid (2 rows of 3)
        for (let i = 0; i < TOTAL_SLOTS; i++) {
          const slotNumber = i + 1;
          
          if (i < first6Slots.length) {
            // Use data from API
            const slot = createParkingSlot(first6Slots[i], slotNumber);
            parkingGrid.appendChild(slot);
          } else {
            // Fallback if kulang ang data
            const emptySlot = createParkingSlot({ status: 'available' }, slotNumber);
            parkingGrid.appendChild(emptySlot);
          }
        }
        
      } catch (error) {
        console.error('Error:', error);
        
        statusBadge.classList.add('warning');
        statusMessage.innerHTML = '⚠️ offline · demo mode';
        
        // Show demo data
        parkingGrid.innerHTML = '';
        
        // Random demo data for 6 slots
        for (let i = 0; i < TOTAL_SLOTS; i++) {
          const randomStatus = Math.random() > 0.5 ? 'occupied' : 'available';
          const slot = createParkingSlot({ status: randomStatus }, i + 1);
          parkingGrid.appendChild(slot);
        }
      }
    }

    // Reset counters
    function resetCounters() {
      totalEntry = 0;
      totalExit = 0;
      previousOccupied = 0; // Reset para hindi mag-iba ang count
      activityLog = [];
      
      totalEntrySpan.innerText = '0';
      totalExitSpan.innerText = '0';
      logEntries.innerHTML = '<div style="color:#888; text-align:center; padding:0.5rem;">— walang activity —</div>';
      
      // Refresh data para mag-sync
      fetchParkingData();
    }

    // Initial fetch
    fetchParkingData();
    
    // Auto-refresh every 3 seconds
    const intervalId = setInterval(fetchParkingData, 3000);
    
    // Event listeners
    refreshBtn.addEventListener('click', () => {
      fetchParkingData();
      // Rotate icon
      const icon = refreshBtn.querySelector('i');
      icon.style.transform = 'rotate(180deg)';
      setTimeout(() => {
        icon.style.transform = 'rotate(0deg)';
      }, 200);
    });
    
    resetBtn.addEventListener('click', resetCounters);
    
    // Cleanup
    window.addEventListener('beforeunload', () => {
      clearInterval(intervalId);
    });

  })();
</script>
</body>
</html>
