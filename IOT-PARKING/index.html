<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Parking Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 480px;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #00bcd4, #667eea);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: #e0f2f1;
      color: #00897b;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #00e676;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: linear-gradient(145deg, #ffffff, #f5f7fa);
      padding: 24px;
      border-radius: 16px;
      text-align: center;
      border: 1px solid rgba(0, 0, 0, 0.05);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
    }

    .stat-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 800;
      color: #1a1a2e;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 13px;
      color: #64748b;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .traffic-section {
      background: #f8fafc;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .traffic-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .traffic-title {
      font-size: 14px;
      font-weight: 600;
      color: #475569;
    }

    .traffic-flow {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .flow-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
    }

    .flow-in {
      color: #22c55e;
    }

    .flow-out {
      color: #ef4444;
    }

    .flow-arrow {
      font-size: 20px;
      animation: flowAnimation 1.5s infinite;
    }

    @keyframes flowAnimation {
      0%, 100% { transform: translateX(0); opacity: 1; }
      50% { transform: translateX(5px); opacity: 0.5; }
    }

    .activity-log {
      max-height: 200px;
      overflow-y: auto;
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      border: 1px solid #e2e8f0;
    }

    .activity-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f1f5f9;
      font-size: 14px;
    }

    .activity-item:last-child {
      border-bottom: none;
    }

    .activity-time {
      font-size: 12px;
      color: #94a3b8;
    }

    .activity-type {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }

    .type-entry {
      color: #22c55e;
    }

    .type-exit {
      color: #ef4444;
    }

    .refresh-btn {
      width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 16px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s;
      box-shadow: 0 4px 6px -1px rgba(102, 126, 234, 0.2);
    }

    .refresh-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
    }

    .refresh-btn:active {
      transform: translateY(0);
    }

    .refresh-btn.spinning .refresh-icon {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .last-updated {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #94a3b8;
    }

    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 24px;
      z-index: 10;
    }

    .loading-overlay.active {
      display: flex;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .total-count {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
  </div>

  <div class="header">
    <h1>🚗 Smart Parking</h1>
    <div class="status-badge">Live Monitoring - Unlimited Access</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">🅿️</div>
      <div class="stat-value" id="inside">0</div>
      <div class="stat-label">Currently Inside</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🚙</div>
      <div class="stat-value" id="exit">0</div>
      <div class="stat-label">Total Exited</div>
    </div>
  </div>

  <div class="traffic-section">
    <div class="traffic-header">
      <span class="traffic-title">Traffic Flow</span>
      <div class="traffic-flow">
        <div class="flow-indicator flow-in">
          <span class="flow-arrow">⬇️</span>
          <span id="entryCount">0 entries</span>
        </div>
        <div class="flow-indicator flow-out">
          <span class="flow-arrow">⬆️</span>
          <span id="exitCount">0 exits</span>
        </div>
      </div>
    </div>
    <div style="font-size: 13px; color: #64748b; margin-top: 8px;">
      Total vehicles processed today: <span class="total-count" id="totalProcessed">0</span>
    </div>
  </div>

  <div class="activity-log" id="activityLog">
    <div style="text-align: center; color: #94a3b8; font-size: 14px; padding: 20px;">
      No activity yet...
    </div>
  </div>

  <button class="refresh-btn" id="refreshBtn" onclick="fetchParkingData()">
    <span class="refresh-icon">🔄</span>
    <span>Refresh Data</span>
  </button>

  <div class="last-updated" id="lastUpdated">Last updated: Never</div>
</div>

<script>
const API_URL = 'https://698d3f03b79d1c928ed4ccbd.mockapi.io/parking';

let activityHistory = [];

function fetchParkingData() {
  const btn = document.getElementById('refreshBtn');
  const loading = document.getElementById('loading');
  
  btn.classList.add('spinning');
  loading.classList.add('active');

  fetch(API_URL)
    .then(res => {
      if (!res.ok) throw new Error('Network response was not ok');
      return res.json();
    })
    .then(data => {
      let totalInside = 0;
      let totalExited = 0;
      let entries = 0;
      let exits = 0;

      // Clear previous activity
      activityHistory = [];

      data.forEach(entry => {
        if (entry.occupied === "1") {
          totalInside++;
          entries++;
          activityHistory.push({
            type: 'entry',
            time: entry.timestamp || new Date().toISOString(),
            id: entry.id
          });
        }
        if (entry.occupied === "0") {
          totalExited++;
          exits++;
          activityHistory.push({
            type: 'exit',
            time: entry.timestamp || new Date().toISOString(),
            id: entry.id
          });
        }
      });

      // Update stats with animation
      animateValue('inside', parseInt(document.getElementById('inside').textContent), totalInside);
      animateValue('exit', parseInt(document.getElementById('exit').textContent), totalExited);
      
      // Update traffic flow indicators
      document.getElementById('entryCount').textContent = `${entries} entries`;
      document.getElementById('exitCount').textContent = `${exits} exits`;
      document.getElementById('totalProcessed').textContent = entries + exits;

      // Update activity log
      updateActivityLog();

      // Update timestamp
      const now = new Date();
      document.getElementById('lastUpdated').textContent = 
        `Last updated: ${now.toLocaleTimeString()}`;
    })
    .catch(err => {
      console.error('Error:', err);
      alert('Failed to fetch parking data');
    })
    .finally(() => {
      btn.classList.remove('spinning');
      loading.classList.remove('active');
    });
}

function updateActivityLog() {
  const log = document.getElementById('activityLog');
  
  if (activityHistory.length === 0) {
    log.innerHTML = '<div style="text-align: center; color: #94a3b8; font-size: 14px; padding: 20px;">No activity yet...</div>';
    return;
  }

  // Sort by time (newest first)
  activityHistory.sort((a, b) => new Date(b.time) - new Date(a.time));

  log.innerHTML = activityHistory.slice(0, 10).map(activity => {
    const time = new Date(activity.time).toLocaleTimeString();
    const isEntry = activity.type === 'entry';
    return `
      <div class="activity-item">
        <div class="activity-type ${isEntry ? 'type-entry' : 'type-exit'}">
          <span>${isEntry ? '🟢' : '🔴'}</span>
          <span>Vehicle ${isEntry ? 'Entered' : 'Exited'}</span>
        </div>
        <div class="activity-time">${time}</div>
      </div>
    `;
  }).join('');
}

function animateValue(id, start, end) {
  if (start === end) return;
  const obj = document.getElementById(id);
  const range = end - start;
  const duration = 500;
  const startTime = performance.now();

  function update(currentTime) {
    const elapsed = currentTime - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const easeProgress = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(start + (range * easeProgress));
    obj.textContent = current;
    
    if (progress < 1) {
      requestAnimationFrame(update);
    }
  }
  
  requestAnimationFrame(update);
}

// Initial fetch
fetchParkingData();

// Auto-refresh every 5 seconds
setInterval(fetchParkingData, 5000);
</script>

</body>
</html>
