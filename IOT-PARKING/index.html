<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3x2 Parking - Multiple Objects</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 700px;
      width: 100%;
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }
    .status {
      text-align: center;
      padding: 10px;
      background: #e3f2fd;
      border-radius: 10px;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .counters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }
    .counter {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }
    .counter.entry {
      border-left: 5px solid #28a745;
    }
    .counter.exit {
      border-left: 5px solid #dc3545;
    }
    .counter .label {
      font-size: 14px;
      color: #666;
    }
    .counter .number {
      font-size: 32px;
      font-weight: bold;
      color: #333;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .stat {
      background: #f8f9fa;
      padding: 8px;
      border-radius: 8px;
      text-align: center;
    }
    .stat .label {
      font-size: 11px;
      color: #666;
    }
    .stat .value {
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }
    .parking-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .slot {
      background: #f8f9fa;
      border: 2px solid #dee2e6;
      border-radius: 10px;
      padding: 15px 5px;
      text-align: center;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .slot.occupied {
      background: #f8d7da;
      border-color: #dc3545;
    }
    .slot.available {
      background: #d4edda;
      border-color: #28a745;
    }
    .slot i {
      font-size: 24px;
      margin-bottom: 5px;
    }
    .slot .id {
      font-weight: bold;
      margin-bottom: 3px;
    }
    .slot .status-text {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 12px;
      color: white;
    }
    .occupied .status-text {
      background: #dc3545;
    }
    .available .status-text {
      background: #28a745;
    }
    .log {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
      max-height: 120px;
      overflow-y: auto;
    }
    .log-title {
      font-weight: bold;
      margin-bottom: 10px;
    }
    .log-entry {
      padding: 5px 0;
      border-bottom: 1px solid #dee2e6;
      display: flex;
      justify-content: space-between;
    }
    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    .refresh {
      background: #007bff;
      color: white;
    }
    .reset {
      background: #6c757d;
      color: white;
    }
    .debug {
      background: #333;
      color: #0f0;
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 12px;
      margin-top: 10px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .mockapi-data {
      background: #e3f2fd;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 10px;
      font-size: 12px;
      max-height: 100px;
      overflow-y: auto;
    }
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }
    .summary-item {
      background: #fff3cd;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-parking"></i> 3x2 Parking - Multiple Objects</h1>

    <!-- Mockapi Data Display -->
    <div class="mockapi-data" id="mockapiDisplay">
      <i class="fas fa-database"></i> <span id="mockapiContent">Waiting for data...</span>
    </div>

    <!-- Simple status -->
    <div class="status" id="statusDisplay">
      <i class="fas fa-circle-notch fa-spin"></i> Loading...
    </div>

    <!-- Entry/Exit counters -->
    <div class="counters">
      <div class="counter entry">
        <div class="label"><i class="fas fa-sign-in-alt"></i> PUMASOK</div>
        <div class="number" id="entryCount">0</div>
      </div>
      <div class="counter exit">
        <div class="label"><i class="fas fa-sign-out-alt"></i> LUMABAS</div>
        <div class="number" id="exitCount">0</div>
      </div>
    </div>

    <!-- Summary ng lahat ng objects -->
    <div class="summary" id="summary">
      <!-- Mapupuno ng JavaScript -->
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="label">TOTAL SLOTS</div>
        <div class="value" id="totalSlots">0</div>
      </div>
      <div class="stat">
        <div class="label">TOTAL OCCUPIED</div>
        <div class="value" id="totalOccupied">0</div>
      </div>
      <div class="stat">
        <div class="label">TOTAL AVAILABLE</div>
        <div class="value" id="totalAvailable">0</div>
      </div>
      <div class="stat">
        <div class="label">OBJECTS</div>
        <div class="value" id="objectCount">0</div>
      </div>
    </div>

    <!-- 3x2 Parking slots (first object lang muna) -->
    <h3>First Object Parking (ID: <span id="firstObjectId">1</span>)</h3>
    <div class="parking-grid" id="parkingGrid">
      <!-- Mapupuno ng JavaScript -->
    </div>

    <!-- Activity log -->
    <div class="log" id="activityLog">
      <div class="log-title"><i class="fas fa-history"></i> Activity</div>
      <div id="logList">— walang activity —</div>
    </div>

    <!-- Buttons -->
    <div class="buttons">
      <button class="refresh" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
      <button class="reset" id="resetBtn"><i class="fas fa-redo-alt"></i> Reset</button>
    </div>

    <!-- Debug info -->
    <div class="debug" id="debugInfo">
      Naghihintay ng data...
    </div>
  </div>

  <script>
    const API_URL = 'https://698d3f03b79d1c928ed4ccbd.mockapi.io/parking';
    
    // Variables
    let previousData = [];
    let totalEntry = 0;
    let totalExit = 0;
    let activityLog = [];

    // Kunin ang elements
    const debugInfo = document.getElementById('debugInfo');
    const mockapiContent = document.getElementById('mockapiContent');
    const summary = document.getElementById('summary');
    const parkingGrid = document.getElementById('parkingGrid');
    const statusDisplay = document.getElementById('statusDisplay');
    const entryCount = document.getElementById('entryCount');
    const exitCount = document.getElementById('exitCount');
    const totalSlots = document.getElementById('totalSlots');
    const totalOccupied = document.getElementById('totalOccupied');
    const totalAvailable = document.getElementById('totalAvailable');
    const objectCount = document.getElementById('objectCount');
    const firstObjectId = document.getElementById('firstObjectId');
    const logList = document.getElementById('logList');

    // Function para mag-compute ng totals
    function computeTotals(data) {
      let slots = 0;
      let occupied = 0;
      let available = 0;
      
      data.forEach(item => {
        const occ = parseInt(item.occupied) || 0;
        const avail = parseInt(item.available) || 0;
        
        occupied += occ;
        available += avail;
        slots += (occ + avail);
      });
      
      return { slots, occupied, available };
    }

    // Function para mag-fetch ng data
    async function fetchData() {
      try {
        debugInfo.innerHTML = '⏳ Kinukuha ang data...';
        statusDisplay.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Loading...';
        
        const response = await fetch(API_URL);
        const data = await response.json();
        
        // Ipakita ang mockapi data
        mockapiContent.innerHTML = JSON.stringify(data, null, 2);
        
        // Compute totals
        const totals = computeTotals(data);
        
        // Ipakita sa debug
        debugInfo.innerHTML = '✓ May data!\n';
        debugInfo.innerHTML += `Number of objects: ${data.length}\n`;
        debugInfo.innerHTML += `Total slots: ${totals.slots}\n`;
        debugInfo.innerHTML += `Total occupied: ${totals.occupied}\n`;
        debugInfo.innerHTML += `Total available: ${totals.available}\n`;
        
        // Update summary
        objectCount.textContent = data.length;
        totalSlots.textContent = totals.slots;
        totalOccupied.textContent = totals.occupied;
        totalAvailable.textContent = totals.available;
        
        // Show summary ng bawat object
        summary.innerHTML = '';
        data.forEach((item, index) => {
          const occ = parseInt(item.occupied) || 0;
          const avail = parseInt(item.available) || 0;
          
          const summaryItem = document.createElement('div');
          summaryItem.className = 'summary-item';
          summaryItem.innerHTML = `
            <div>Object ${item.id}</div>
            <div style="font-size: 14px;">Occupied: ${occ} | Available: ${avail}</div>
          `;
          summary.appendChild(summaryItem);
        });

        // Check kung may nagbago (para sa entry/exit count)
        if (previousData.length > 0) {
          const previousTotals = computeTotals(previousData);
          
          if (totals.occupied > previousTotals.occupied) {
            const diff = totals.occupied - previousTotals.occupied;
            totalEntry += diff;
            addToLog('entry', diff + ' sasakyan pumasok');
          } else if (totals.occupied < previousTotals.occupied) {
            const diff = previousTotals.occupied - totals.occupied;
            totalExit += diff;
            addToLog('exit', diff + ' sasakyan lumabas');
          }
        }

        // I-save ang current data
        previousData = [...data];

        // Update counters
        entryCount.textContent = totalEntry;
        exitCount.textContent = totalExit;

        // Update status
        if (totals.available === 0) {
          statusDisplay.innerHTML = '⚠️ PUNO NA! Lahat occupied';
        } else {
          statusDisplay.innerHTML = `✅ ${totals.available} bakante · ${totals.occupied} nakapark (total)`;
        }

        // Ipakita ang unang object sa parking grid
        if (data.length > 0) {
          const firstItem = data[0];
          firstObjectId.textContent = firstItem.id;
          
          const occ = parseInt(firstItem.occupied) || 0;
          const total = occ + (parseInt(firstItem.available) || 0);
          
          // Update parking grid - 3x2 = 6 slots
          parkingGrid.innerHTML = '';
          
          for (let i = 0; i < 6; i++) {
            // Kung ang slot number ay <= occupied, occupied siya
            const isOccupied = i < occ;
            
            const slotDiv = document.createElement('div');
            slotDiv.className = `slot ${isOccupied ? 'occupied' : 'available'}`;
            
            slotDiv.innerHTML = `
              <i class="fas ${isOccupied ? 'fa-car' : 'fa-parking'}"></i>
              <div class="id">Slot ${i+1}</div>
              <div class="status-text">${isOccupied ? 'OCCUPIED' : 'AVAILABLE'}</div>
            `;
            
            parkingGrid.appendChild(slotDiv);
          }
        }

      } catch (error) {
        debugInfo.innerHTML = '❌ Error: ' + error.message;
        statusDisplay.innerHTML = '❌ Error sa connection';
        mockapiContent.innerHTML = 'Error: ' + error.message;
      }
    }

    // Function para mag-add sa log
    function addToLog(type, message) {
      const time = new Date().toLocaleTimeString();
      activityLog.unshift({ type, message, time });
      
      // Keep last 5 entries
      if (activityLog.length > 5) {
        activityLog.pop();
      }
      
      // Update log display
      logList.innerHTML = '';
      if (activityLog.length === 0) {
        logList.innerHTML = '— walang activity —';
      } else {
        activityLog.forEach(log => {
          const div = document.createElement('div');
          div.className = 'log-entry';
          div.innerHTML = `
            <span>
              <i class="fas ${log.type === 'entry' ? 'fa-sign-in-alt' : 'fa-sign-out-alt'}" 
                 style="color: ${log.type === 'entry' ? '#28a745' : '#dc3545'}"></i>
              ${log.message}
            </span>
            <span style="color: #999; font-size: 11px;">${log.time}</span>
          `;
          logList.appendChild(div);
        });
      }
    }

    // Reset function
    function resetCounters() {
      totalEntry = 0;
      totalExit = 0;
      previousData = [];
      activityLog = [];
      
      entryCount.textContent = '0';
      exitCount.textContent = '0';
      logList.innerHTML = '— walang activity —';
      
      // Refresh data
      fetchData();
    }

    // Initial fetch
    fetchData();

    // Auto-refresh every 3 seconds
    setInterval(fetchData, 3000);

    // Button events
    document.getElementById('refreshBtn').addEventListener('click', fetchData);
    document.getElementById('resetBtn').addEventListener('click', resetCounters);

  </script>
</body>
</html>
