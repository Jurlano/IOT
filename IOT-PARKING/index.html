<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Parking Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 480px;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #00bcd4, #667eea);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: #e0f2f1;
      color: #00897b;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #00e676;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: linear-gradient(145deg, #ffffff, #f5f7fa);
      padding: 24px;
      border-radius: 16px;
      text-align: center;
      border: 1px solid rgba(0, 0, 0, 0.05);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
    }

    .stat-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 800;
      color: #1a1a2e;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 13px;
      color: #64748b;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .capacity-section {
      background: #f8fafc;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .capacity-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .capacity-title {
      font-size: 14px;
      font-weight: 600;
      color: #475569;
    }

    .capacity-ratio {
      font-size: 14px;
      font-weight: 700;
      color: #667eea;
    }

    .progress-bar {
      height: 12px;
      background: #e2e8f0;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .status-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
    }

    .status-available {
      background: #dcfce7;
      color: #166534;
    }

    .status-full {
      background: #fee2e2;
      color: #991b1b;
    }

    .status-near {
      background: #fef3c7;
      color: #92400e;
    }

    .parking-visual {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    .slot {
      aspect-ratio: 1;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: all 0.3s;
      border: 2px solid transparent;
    }

    .slot.occupied {
      background: #fee2e2;
      color: #ef4444;
      border-color: #fecaca;
    }

    .slot.available {
      background: #dcfce7;
      color: #22c55e;
      border-color: #bbf7d0;
    }

    .refresh-btn {
      width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 16px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s;
      box-shadow: 0 4px 6px -1px rgba(102, 126, 234, 0.2);
    }

    .refresh-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
    }

    .refresh-btn:active {
      transform: translateY(0);
    }

    .refresh-btn.spinning .refresh-icon {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .last-updated {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #94a3b8;
    }

    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 24px;
      z-index: 10;
    }

    .loading-overlay.active {
      display: flex;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
  </div>

  <div class="header">
    <h1>🚗 Smart Parking</h1>
    <div class="status-badge">Live Monitoring</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">🅿️</div>
      <div class="stat-value" id="occupied">0</div>
      <div class="stat-label">Occupied</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">✓</div>
      <div class="stat-value" id="available">0</div>
      <div class="stat-label">Available</div>
    </div>
  </div>

  <div class="capacity-section">
    <div class="capacity-header">
      <span class="capacity-title">Capacity Usage</span>
      <span class="capacity-ratio" id="capacityRatio">0/0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressBar" style="width: 0%; background: linear-gradient(90deg, #00bcd4, #667eea);"></div>
    </div>
    <div class="status-indicator status-available" id="statusIndicator">
      <span id="statusIcon">✓</span>
      <span id="statusText">Spaces Available</span>
    </div>
  </div>

  <div class="parking-visual" id="parkingGrid">
    <!-- Slots generated by JS -->
  </div>

  <button class="refresh-btn" id="refreshBtn" onclick="fetchParkingData()">
    <span class="refresh-icon">🔄</span>
    <span>Refresh Data</span>
  </button>

  <div class="last-updated" id="lastUpdated">Last updated: Never</div>
</div>

<script>
const API_URL = 'https://698d3f03b79d1c928ed4ccbd.mockapi.io/parking';

// Calculate total capacity from first data fetch
let totalCapacity = 0;

function initParkingGrid(capacity) {
  const grid = document.getElementById('parkingGrid');
  grid.innerHTML = '';
  for (let i = 0; i < capacity; i++) {
    const slot = document.createElement('div');
    slot.className = 'slot available';
    slot.id = `slot-${i}`;
    slot.innerHTML = '✓';
    grid.appendChild(slot);
  }
}

function updateParkingGrid(occupied, total) {
  for (let i = 0; i < total; i++) {
    const slot = document.getElementById(`slot-${i}`);
    if (slot) {
      if (i < occupied) {
        slot.className = 'slot occupied';
        slot.innerHTML = '🚗';
      } else {
        slot.className = 'slot available';
        slot.innerHTML = '✓';
      }
    }
  }
}

function fetchParkingData() {
  const btn = document.getElementById('refreshBtn');
  const loading = document.getElementById('loading');
  
  btn.classList.add('spinning');
  loading.classList.add('active');

  fetch(API_URL)
    .then(res => {
      if (!res.ok) throw new Error('Network response was not ok');
      return res.json();
    })
    .then(data => {
      // Get the first (or most recent) entry
      const parkingData = Array.isArray(data) ? data[0] : data;
      
      const occupied = parseInt(parkingData.occupied) || 0;
      const available = parseInt(parkingData.available) || 0;
      const status = parkingData.status || 'unknown';
      const total = occupied + available;
      
      // Initialize grid on first load
      if (totalCapacity === 0 && total > 0) {
        totalCapacity = total;
        initParkingGrid(total);
      }

      // Update stats with animation
      animateValue('occupied', parseInt(document.getElementById('occupied').textContent), occupied);
      animateValue('available', parseInt(document.getElementById('available').textContent), available);

      // Update capacity display
      document.getElementById('capacityRatio').textContent = `${occupied}/${total}`;
      
      // Update progress bar
      const percentage = total > 0 ? (occupied / total) * 100 : 0;
      const progressBar = document.getElementById('progressBar');
      progressBar.style.width = `${percentage}%`;
      
      // Color code based on availability
      if (available === 0) {
        progressBar.style.background = 'linear-gradient(90deg, #ef4444, #dc2626)';
      } else if (available <= 2) {
        progressBar.style.background = 'linear-gradient(90deg, #f59e0b, #d97706)';
      } else {
        progressBar.style.background = 'linear-gradient(90deg, #00bcd4, #667eea)';
      }

      // Update status indicator
      const statusIndicator = document.getElementById('statusIndicator');
      const statusIcon = document.getElementById('statusIcon');
      const statusText = document.getElementById('statusText');
      
      statusIndicator.className = 'status-indicator';
      
      if (available === 0) {
        statusIndicator.classList.add('status-full');
        statusIcon.textContent = '🚫';
        statusText.textContent = 'Parking Full';
      } else if (available <= 2) {
        statusIndicator.classList.add('status-near');
        statusIcon.textContent = '⚠️';
        statusText.textContent = 'Almost Full';
      } else {
        statusIndicator.classList.add('status-available');
        statusIcon.textContent = '✓';
        statusText.textContent = 'Spaces Available';
      }

      // Update visual grid
      updateParkingGrid(occupied, total);

      // Update timestamp
      const now = new Date();
      document.getElementById('lastUpdated').textContent = 
        `Last updated: ${now.toLocaleTimeString()}`;
    })
    .catch(err => {
      console.error('Error:', err);
      alert('Failed to fetch parking data');
    })
    .finally(() => {
      btn.classList.remove('spinning');
      loading.classList.remove('active');
    });
}

function animateValue(id, start, end) {
  if (start === end) return;
  const obj = document.getElementById(id);
  const range = end - start;
  const duration = 500;
  const startTime = performance.now();

  function update(currentTime) {
    const elapsed = currentTime - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const easeProgress = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(start + (range * easeProgress));
    obj.textContent = current;
    
    if (progress < 1) {
      requestAnimationFrame(update);
    }
  }
  
  requestAnimationFrame(update);
}

// Initial fetch
fetchParkingData();

// Auto-refresh every 5 seconds
setInterval(fetchParkingData, 5000);
</script>

</body>
</html>
