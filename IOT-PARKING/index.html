<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      text-align: center;
      width: 300px;
    }

    h1 {
      margin-bottom: 20px;
      color: #00bcd4;
    }

    .stat {
      margin: 15px 0;
      font-size: 20px;
      font-weight: bold;
    }

    .alert {
      background-color: #f44336;
      color: white;
      padding: 10px;
      margin-top: 20px;
      border-radius: 8px;
      display: none;
    }

    button {
      background-color: #00bcd4;
      color: white;
      border: none;
      padding: 10px 20px;
      margin-top: 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background-color: #0097a7;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>⚡ Parking Tracker ⚡</h1>
    <div class="stat">Vehicles Inside: <span id="inside">0</span></div>
    <div class="stat">Vehicles Exited: <span id="exit">0</span></div>
    <div class="alert" id="alert">⚠️ Parking Full! Over Capacity!</div>
    <button onclick="fetchParkingData()">Refresh Data</button>
  </div>

  <script>
    const API_URL = 'https://698d3f03b79d1c928ed4ccbd.mockapi.io/parking';
    const MAX_CAPACITY = 6;

    async function fetchParkingData() {
      try {
        const response = await fetch(API_URL);
        const data = await response.json();

        let totalInside = 0;
        let totalExited = 0;

        data.forEach(entry => {
          totalInside += parseInt(entry.occupied);
          totalExited += parseInt(entry.available);
        });

        document.getElementById('inside').textContent = totalInside;
        document.getElementById('exit').textContent = totalExited;

        const alertBox = document.getElementById('alert');
        if (totalInside > MAX_CAPACITY) {
          alertBox.style.display = 'block';
        } else {
          alertBox.style.display = 'none';
        }

      } catch (error) {
        console.error('Error fetching data:', error);
        alert('Failed to fetch parking data');
      }
    }

    // Fetch on page load
    fetchParkingData();
  </script>

</body>
</html>
