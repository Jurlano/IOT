<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <title>⚡ PARKiT · CYBER ADLAW ⚡</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="parking-container">
        <div class="park-card">

            <!-- HEADER -->
            <div class="adlaw-header">
                <span class="api-tag">
                    <i class="fas fa-skull"></i> CYBER•PARK
                </span>
                <span class="date-badge" id="dateDisplay">
                    <i class="far fa-calendar-alt"></i> LOAD...
                </span>
            </div>

            <!-- CURRENT INSIDE -->
            <div class="today-counter">
                <div class="adlaw-label">
                    <i class="fas fa-car-side"></i> NAA SULOD KARON
                </div>
                <div>
                    <span class="adlaw-number" id="currentInside">—</span>
                    <span class="adlaw-unit">ka sakyanan</span>
                </div>
                <div class="slots-left" id="vacantSlots">
                    <i class="fas fa-parking"></i> — ka slots ang bakante
                </div>
            </div>

            <!-- ALERT BOX -->
            <div class="alert-box" id="alertBox" style="display: none;">
                <i class="fas fa-triangle-exclamation"></i>
                <span class="alert-text">PARKING FULL!</span>
            </div>

            <!-- ENTRANCE & EXIT BOXES -->
            <div class="stats-grid">
                <div class="stat-box entrance-box">
                    <i class="fas fa-arrow-right-to-bracket"></i>
                    <div class="stat-label">SULOD KARON</div>
                    <div class="stat-number" id="todayEntrance">0</div>
                    <div class="stat-sub">ka entrance</div>
                </div>
                <div class="stat-box exit-box">
                    <i class="fas fa-arrow-right-from-bracket"></i>
                    <div class="stat-label">GAWAS KARON</div>
                    <div class="stat-number" id="todayExit">0</div>
                    <div class="stat-sub">ka exit</div>
                </div>
            </div>

            <!-- CAPACITY BAR -->
            <div class="capacity-section">
                <div class="capacity-header">
                    <span><i class="fas fa-chart-bar"></i> CAPACITY (6 MAX)</span>
                    <span id="capacityText">0/6</span>
                </div>
                <div class="capacity-bar-bg">
                    <div class="capacity-bar-fill" id="capacityBar"></div>
                </div>
            </div>

            <!-- HISTORY LIST -->
            <div class="history-section">
                <div class="history-header">
                    <i class="fas fa-history"></i> HISTORY LOG
                    <span class="latest-badge">LATEST</span>
                </div>
                <ul class="history-list" id="historyList">
                    <!-- dynamically populated -->
                </ul>
            </div>

            <!-- REFRESH BUTTON -->
            <button class="refresh-btn" id="refreshBtn">
                <i class="fas fa-sync-alt"></i> i-REFRESH
            </button>

            <!-- FOOTER -->
            <div class="footer">
                <span><i class="fas fa-microchip"></i> ADLAW•ZERO</span>
                <span><i class="fas fa-database"></i> MOCK</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
