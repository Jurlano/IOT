<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      text-align: center;
      width: 100%;
      max-width: 380px;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #00bcd4, #667eea);
    }

    h1 {
      margin-bottom: 30px;
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .stats-wrapper {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: linear-gradient(145deg, #f8fafc, #ffffff);
      padding: 20px;
      border-radius: 16px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
    }

    .stat-label {
      font-size: 13px;
      color: #64748b;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 800;
      color: #1e293b;
      line-height: 1;
    }

    .stat-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .net-indicator {
      background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
      padding: 16px;
      border-radius: 12px;
      margin: 20px 0;
      border: 1px solid #bae6fd;
    }

    .net-label {
      font-size: 12px;
      color: #0369a1;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .net-value {
      font-size: 32px;
      font-weight: 800;
      color: #0284c7;
    }

    button {
      background: linear-gradient(135deg, #00bcd4 0%, #0097a7 100%);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      width: 100%;
      transition: all 0.3s;
      box-shadow: 0 4px 6px -1px rgba(0, 188, 212, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(0, 188, 212, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .refresh-icon {
      font-size: 18px;
      transition: transform 0.3s;
    }

    button:hover .refresh-icon {
      transform: rotate(180deg);
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>⚡ Parking Tracker</h1>
    
    <div class="stats-wrapper">
      <div class="stat-card">
        <div class="stat-icon">⬇️</div>
        <div class="stat-label">Total Entered</div>
        <div class="stat-value" id="entered">0</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">⬆️</div>
        <div class="stat-label">Total Exited</div>
        <div class="stat-value" id="exited">0</div>
      </div>
    </div>

    <div class="net-indicator">
      <div class="net-label">Currently Inside</div>
      <div class="net-value" id="inside">0</div>
    </div>
    
    <button onclick="fetchParkingData()" id="refreshBtn">
      <span class="refresh-icon">🔄</span>
      <span>Refresh Data</span>
    </button>
  </div>

 <script>
const API_URL = 'https://698d3f03b79d1c928ed4ccbd.mockapi.io/parking';

async function fetchParkingData() {
  const btn = document.getElementById('refreshBtn');
  const originalContent = btn.innerHTML;
  
  // Show loading state
  btn.innerHTML = 'Loading...';
  btn.disabled = true;

  try {
    const response = await fetch(API_URL);
    const data = await response.json();

    let totalEntered = 0;
    let totalExited = 0;
    let isFull = false;

    data.forEach(entry => {
      if (entry.occupied === "1") totalEntered++;
      if (entry.occupied === "0") totalExited++;
      if (entry.status === "full" || parseInt(entry.available) === 0) isFull = true;
    });

    const currentlyInside = totalEntered - totalExited;

    // Animate values
    animateValue('entered', parseInt(document.getElementById('entered').textContent), totalEntered);
    animateValue('exited', parseInt(document.getElementById('exited').textContent), totalExited);
    animateValue('inside', parseInt(document.getElementById('inside').textContent), currentlyInside);

    // Update full status
    document.getElementById('statusText').textContent = isFull ? '🚨 Parking Full!' : '';

  } catch (error) {
    console.error('Error fetching data:', error);
    alert('Failed to fetch parking data');
  } finally {
    btn.innerHTML = originalContent;
    btn.disabled = false;
  }
}

function animateValue(id, start, end) {
  if (start === end) return;
  const obj = document.getElementById(id);
  const range = end - start;
  const duration = 500;
  const startTime = performance.now();

  function update(currentTime) {
    const elapsed = currentTime - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const easeProgress = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(start + (range * easeProgress));
    obj.textContent = current;
    
    if (progress < 1) requestAnimationFrame(update);
  }
  
  requestAnimationFrame(update);
}

// Fetch on page load
fetchParkingData();

// Auto-refresh every 5 seconds
setInterval(fetchParkingData, 5000);
</script>
</body>
</html>
