<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3x2 Parking - Enter/Exit Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      width: 100%;
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    h1 i {
      color: #667eea;
    }

    .mockapi-info {
      background: #f0f4f8;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-family: monospace;
      font-size: 13px;
      overflow-x: auto;
      border-left: 4px solid #667eea;
      max-height: 150px;
      overflow-y: auto;
    }

    .status-badge {
      text-align: center;
      padding: 12px;
      background: #e3f2fd;
      border-radius: 50px;
      margin-bottom: 25px;
      font-weight: bold;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .status-badge.success {
      background: #d4edda;
      color: #155724;
    }

    .status-badge.warning {
      background: #fff3cd;
      color: #856404;
    }

    .status-badge.error {
      background: #f8d7da;
      color: #721c24;
    }

    .main-counters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 25px;
    }

    .counter-box {
      background: white;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      border: 1px solid #e0e0e0;
      transition: transform 0.2s;
    }

    .counter-box:hover {
      transform: translateY(-3px);
    }

    .counter-box.enter {
      border-top: 5px solid #28a745;
    }

    .counter-box.exit {
      border-top: 5px solid #dc3545;
    }

    .counter-box .label {
      font-size: 18px;
      color: #666;
      margin-bottom: 10px;
    }

    .counter-box .label i {
      margin-right: 8px;
    }

    .counter-box .number {
      font-size: 56px;
      font-weight: bold;
      color: #333;
      line-height: 1;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 25px;
    }

    .stat-card {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #e9ecef;
    }

    .stat-card .label {
      font-size: 14px;
      color: #6c757d;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: bold;
      color: #333;
    }

    .parking-section {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 25px;
    }

    .parking-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      font-weight: bold;
      color: #495057;
    }

    .parking-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .parking-slot {
      background: white;
      border: 2px solid #dee2e6;
      border-radius: 12px;
      padding: 15px 5px;
      text-align: center;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      cursor: pointer;
    }

    .parking-slot:hover {
      transform: scale(1.02);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .parking-slot.occupied {
      background: #f8d7da;
      border-color: #dc3545;
    }

    .parking-slot.available {
      background: #d4edda;
      border-color: #28a745;
    }

    .parking-slot i {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .parking-slot .slot-number {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 5px;
    }

    .parking-slot .slot-status {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      color: white;
      font-weight: bold;
    }

    .occupied .slot-status {
      background: #dc3545;
    }

    .available .slot-status {
      background: #28a745;
    }

    .listcar-info {
      background: #fff3cd;
      border: 1px solid #ffeeba;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .listcar-info i {
      color: #856404;
      margin-right: 8px;
    }

    .listcar-items {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .listcar-tag {
      background: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      border: 1px solid #ffe69c;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .activity-log {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      max-height: 200px;
      overflow-y: auto;
    }

    .log-title {
      font-weight: bold;
      margin-bottom: 12px;
      color: #495057;
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 0;
      background: white;
      padding-bottom: 8px;
      border-bottom: 1px solid #e0e0e0;
    }

    .log-entry {
      padding: 8px 0;
      border-bottom: 1px dashed #e0e0e0;
      display: flex;
      justify-content: space-between;
      font-size: 13px;
    }

    .log-entry.enter {
      color: #28a745;
    }

    .log-entry.exit {
      color: #dc3545;
    }

    .log-time {
      color: #999;
      font-size: 11px;
    }

    .button-group {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 15px;
    }

    button {
      padding: 12px 30px;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
      font-size: 14px;
    }

    button i {
      font-size: 16px;
    }

    .btn-refresh {
      background: #667eea;
      color: white;
    }

    .btn-refresh:hover {
      background: #5a67d8;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-reset {
      background: #6c757d;
      color: white;
    }

    .btn-reset:hover {
      background: #5a6268;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(108, 117, 125, 0.4);
    }

    .debug-panel {
      margin-top: 20px;
      background: #1e1e2f;
      color: #0ff;
      padding: 15px;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 150px;
      overflow-y: auto;
      border: 1px solid #334;
    }

    .last-updated {
      text-align: right;
      font-size: 11px;
      color: #999;
      margin-top: 10px;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <i class="fas fa-parking"></i>
      3x2 Parking Tracker
    </h1>

    <!-- Mockapi Data Display -->
    <div class="mockapi-info" id="mockapiDisplay">
      <i class="fas fa-database"></i> Naghihintay ng data...
    </div>

    <!-- Status Badge -->
    <div class="status-badge" id="statusDisplay">
      <span class="loading-spinner"></span> Loading...
    </div>

    <!-- Enter/Exit Main Counters -->
    <div class="main-counters">
      <div class="counter-box enter">
        <div class="label">
          <i class="fas fa-sign-in-alt"></i> ENTER (Session)
        </div>
        <div class="number" id="enterCount">0</div>
      </div>
      <div class="counter-box exit">
        <div class="label">
          <i class="fas fa-sign-out-alt"></i> EXIT (Session)
        </div>
        <div class="number" id="exitCount">0</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">TOTAL OBJECTS</div>
        <div class="value" id="totalObjects">0</div>
      </div>
      <div class="stat-card">
        <div class="label">TOTAL ENTER (API)</div>
        <div class="value" id="totalEnterSum">0</div>
      </div>
      <div class="stat-card">
        <div class="label">TOTAL EXIT (API)</div>
        <div class="value" id="totalExitSum">0</div>
      </div>
    </div>

    <!-- Listcar Information -->
    <div class="listcar-info" id="listcarDisplay">
      <i class="fas fa-list"></i> <span>Walang listcar data</span>
      <div class="listcar-items" id="listcarItems"></div>
    </div>

    <!-- 3x2 Parking Grid -->
    <div class="parking-section">
      <div class="parking-title">
        <span><i class="fas fa-grid-2"></i> 3x2 Parking Layout</span>
        <span class="badge" id="currentObjectId">Object ID: -</span>
      </div>
      <div class="parking-grid" id="parkingGrid">
        <!-- 6 slots will be inserted here -->
      </div>
    </div>

    <!-- Activity Log -->
    <div class="activity-log">
      <div class="log-title">
        <i class="fas fa-history"></i> Recent Activity
        <span style="font-size: 11px; color: #999; margin-left: auto;" id="activityCount">0 events</span>
      </div>
      <div id="activityList">
        — walang activity —
      </div>
    </div>

    <!-- Buttons -->
    <div class="button-group">
      <button class="btn-refresh" id="refreshBtn">
        <i class="fas fa-sync-alt"></i> Refresh Now
      </button>
      <button class="btn-reset" id="resetBtn">
        <i class="fas fa-redo-alt"></i> Reset Session
      </button>
    </div>

    <!-- Last Updated -->
    <div class="last-updated" id="lastUpdated"></div>

    <!-- Debug Panel -->
    <div class="debug-panel" id="debugPanel">
      Initializing...
    </div>
  </div>

  <script>
    const API_URL = 'https://698d3f03b79d1c928ed4ccbd.mockapi.io/parking';
    
    // Variables for tracking
    let previousData = [];
    let sessionEnter = 0;
    let sessionExit = 0;
    let activityLog = [];
    let autoRefreshInterval;

    // DOM Elements
    const mockapiDisplay = document.getElementById('mockapiDisplay');
    const statusDisplay = document.getElementById('statusDisplay');
    const enterCount = document.getElementById('enterCount');
    const exitCount = document.getElementById('exitCount');
    const totalObjects = document.getElementById('totalObjects');
    const totalEnterSum = document.getElementById('totalEnterSum');
    const totalExitSum = document.getElementById('totalExitSum');
    const listcarDisplay = document.getElementById('listcarDisplay');
    const listcarItems = document.getElementById('listcarItems');
    const currentObjectId = document.getElementById('currentObjectId');
    const parkingGrid = document.getElementById('parkingGrid');
    const activityList = document.getElementById('activityList');
    const activityCount = document.getElementById('activityCount');
    const lastUpdated = document.getElementById('lastUpdated');
    const debugPanel = document.getElementById('debugPanel');

    // Function to add to activity log
    function addToLog(type, message, details = '') {
      const time = new Date().toLocaleTimeString();
      activityLog.unshift({ type, message, details, time });
      
      if (activityLog.length > 10) {
        activityLog.pop();
      }
      
      updateActivityDisplay();
      updateDebug(`${type}: ${message} ${details}`);
    }

    // Function to update activity display
    function updateActivityDisplay() {
      if (activityLog.length === 0) {
        activityList.innerHTML = '— walang activity —';
        activityCount.textContent = '0 events';
        return;
      }
      
      activityList.innerHTML = '';
      activityCount.textContent = `${activityLog.length} events`;
      
      activityLog.forEach(log => {
        const entry = document.createElement('div');
        entry.className = `log-entry ${log.type}`;
        entry.innerHTML = `
          <span>
            <i class="fas ${log.type === 'enter' ? 'fa-sign-in-alt' : 'fa-sign-out-alt'}"></i>
            ${log.message}
            ${log.details ? `<small style="color: #666;">(${log.details})</small>` : ''}
          </span>
          <span class="log-time">${log.time}</span>
        `;
        activityList.appendChild(entry);
      });
    }

    // Function to update debug panel
    function updateDebug(message) {
      const timestamp = new Date().toLocaleTimeString();
      debugPanel.innerHTML = `[${timestamp}] ${message}\n` + debugPanel.innerHTML;
      if (debugPanel.children.length > 5) {
        debugPanel.lastElementChild?.remove();
      }
    }

    // Function to create parking slot
    function createSlot(number, isOccupied, vehicleInfo = '') {
      const slot = document.createElement('div');
      slot.className = `parking-slot ${isOccupied ? 'occupied' : 'available'}`;
      
      slot.innerHTML = `
        <i class="fas ${isOccupied ? 'fa-car' : 'fa-parking'}"></i>
        <div class="slot-number">Slot ${number}</div>
        <div class="slot-status">${isOccupied ? 'OCCUPIED' : 'AVAILABLE'}</div>
        ${vehicleInfo ? `<small style="font-size: 9px; margin-top: 5px;">${vehicleInfo}</small>` : ''}
      `;
      
      // Add click handler
      slot.addEventListener('click', () => {
        updateDebug(`Slot ${number} clicked - ${isOccupied ? 'Occupied' : 'Available'}`);
      });
      
      return slot;
    }

    // Main fetch function
    async function fetchData() {
      try {
        statusDisplay.className = 'status-badge';
        statusDisplay.innerHTML = '<span class="loading-spinner"></span> Fetching data...';
        updateDebug('Fetching data from API...');
        
        const response = await fetch(API_URL);
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        
        // Display raw mockapi data (formatted)
        mockapiDisplay.innerHTML = `<i class="fas fa-database"></i> ${JSON.stringify(data, null, 2)}`;
        
        // Update object count
        totalObjects.textContent = data.length;
        
        // Calculate totals
        let totalEnterValue = 0;
        let totalExitValue = 0;
        let listcarArray = [];
        
        data.forEach(item => {
          const enter = parseInt(item.enter) || 0;
          const exit = parseInt(item.exit) || 0;
          
          totalEnterValue += enter;
          totalExitValue += exit;
          
          if (item.listcar && item.listcar.trim() !== '') {
            listcarArray.push({
              id: item.id,
              listcar: item.listcar
            });
          }
        });
        
        // Update total displays
        totalEnterSum.textContent = totalEnterValue;
        totalExitSum.textContent = totalExitValue;
        
        // Update listcar display
        if (listcarArray.length > 0) {
          listcarItems.innerHTML = listcarArray.map(item => 
            `<span class="listcar-tag" title="Object ID: ${item.id}">
              <i class="fas fa-car"></i> ${item.listcar}
            </span>`
          ).join('');
          listcarDisplay.querySelector('span').textContent = 'Registered vehicles:';
        } else {
          listcarItems.innerHTML = '';
          listcarDisplay.querySelector('span').textContent = 'Walang listcar data';
        }
        
        // Check for changes (entry/exit events)
        if (previousData.length > 0) {
          let enterDiff = 0;
          let exitDiff = 0;
          let changedObjects = [];
          
          data.forEach((item, index) => {
            if (index < previousData.length) {
              const prevEnter = parseInt(previousData[index].enter) || 0;
              const currEnter = parseInt(item.enter) || 0;
              const prevExit = parseInt(previousData[index].exit) || 0;
              const currExit = parseInt(item.exit) || 0;
              
              if (currEnter > prevEnter) {
                const diff = currEnter - prevEnter;
                enterDiff += diff;
                changedObjects.push(`Obj ${item.id}: +${diff} enter`);
              }
              if (currExit > prevExit) {
                const diff = currExit - prevExit;
                exitDiff += diff;
                changedObjects.push(`Obj ${item.id}: +${diff} exit`);
              }
            }
          });
          
          if (enterDiff > 0) {
            sessionEnter += enterDiff;
            addToLog('enter', `${enterDiff} new vehicle(s) entered`, changedObjects.join(', '));
          }
          
          if (exitDiff > 0) {
            sessionExit += exitDiff;
            addToLog('exit', `${exitDiff} vehicle(s) exited`, changedObjects.join(', '));
          }
        }
        
        // Update main counters
        enterCount.textContent = sessionEnter;
        exitCount.textContent = sessionExit;
        
        // Update status
        statusDisplay.className = 'status-badge success';
        statusDisplay.innerHTML = `
          <i class="fas fa-check-circle"></i> 
          ${data.length} objects · Total Enter: ${totalEnterValue} · Total Exit: ${totalExitValue}
        `;
        
        // Display first object's parking
        if (data.length > 0) {
          const firstItem = data[0];
          currentObjectId.textContent = `Object ID: ${firstItem.id}`;
          
          // Use enter count to determine occupied slots (max 6)
          const occupiedCount = Math.min(parseInt(firstItem.enter) || 0, 6);
          
          // Clear and populate parking grid
          parkingGrid.innerHTML = '';
          
          for (let i = 0; i < 6; i++) {
            const isOccupied = i < occupiedCount;
            const vehicleInfo = isOccupied && firstItem.listcar ? firstItem.listcar : '';
            const slot = createSlot(i + 1, isOccupied, vehicleInfo);
            parkingGrid.appendChild(slot);
          }
        }
        
        // Update last updated time
        lastUpdated.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
        
        // Save current data for next comparison
        previousData = [...data];
        
        updateDebug(`Data loaded: ${data.length} objects`);
        
      } catch (error) {
        console.error('Fetch error:', error);
        statusDisplay.className = 'status-badge error';
        statusDisplay.innerHTML = `<i class="fas fa-exclamation-circle"></i> Error: ${error.message}`;
        updateDebug(`Error: ${error.message}`);
      }
    }

    // Reset session counters
    function resetCounters() {
      if (confirm('Reset session counters and activity log?')) {
        sessionEnter = 0;
        sessionExit = 0;
        activityLog = [];
        
        enterCount.textContent = '0';
        exitCount.textContent = '0';
        updateActivityDisplay();
        
        updateDebug('Session counters reset');
      }
    }

    // Clean up interval on page unload
    window.addEventListener('beforeunload', () => {
      if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
      }
    });

    // Initial fetch
    fetchData();
    
    // Auto-refresh every 3 seconds
    autoRefreshInterval = setInterval(fetchData, 3000);
    
    // Event listeners
    document.getElementById('refreshBtn').addEventListener('click', () => {
      fetchData();
    });
    
    document.getElementById('resetBtn').addEventListener('click', resetCounters);

  </script>
</body>
</html>
