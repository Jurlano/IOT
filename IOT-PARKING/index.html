<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3x2 parking · mockapi tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #e9f0f9 0%, #f5f9ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .glass-panel {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 1.8rem 1.5rem;
      box-shadow: 0 30px 60px -20px rgba(0, 40, 80, 0.35),
                  inset 0 1px 2px rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.5);
    }

    h1 {
      font-weight: 600;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #112b3f;
      margin-bottom: 0.8rem;
    }

    .debug-info {
      background: #1e1e2f;
      color: #0ff;
      padding: 0.8rem;
      border-radius: 12px;
      font-family: monospace;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 100px;
      overflow-y: auto;
    }

    .status-badge {
      text-align: center;
      font-size: 1rem;
      font-weight: 500;
      padding: 0.6rem 1.2rem;
      border-radius: 100px;
      width: fit-content;
      margin: 0.3rem auto 1.2rem auto;
      background: #edf6fc;
      color: #0b4b6b;
      border: 1px solid #c2dcf0;
      transition: all 0.2s ease;
    }

    .status-badge.warning {
      background: #ffecdd;
      color: #ac3800;
      border-color: #ffb68b;
    }

    .entry-exit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .counter-card {
      background: linear-gradient(145deg, #ffffff, #f5f9ff);
      border-radius: 24px;
      padding: 1.2rem;
      text-align: center;
      border: 1px solid rgba(30, 79, 107, 0.2);
      box-shadow: 0 10px 20px -10px rgba(0,80,120,0.2);
    }

    .counter-card.entry {
      border-left: 6px solid #4caf50;
    }

    .counter-card.exit {
      border-left: 6px solid #f44336;
    }

    .counter-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #1e4f6b;
      margin-bottom: 0.3rem;
    }

    .counter-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: #112b3f;
      line-height: 1.2;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: white;
      border-radius: 20px;
      padding: 1rem 0.5rem;
      text-align: center;
      box-shadow: 0 15px 30px -12px rgba(21, 50, 80, 0.15);
      border: 1px solid rgba(0,150,200,0.15);
    }

    .stat-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 600;
      color: #42758e;
      margin-bottom: 0.3rem;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0f3b4f;
      line-height: 1.2;
    }

    .parking-container {
      background: rgba(255,255,255,0.6);
      border-radius: 28px;
      padding: 1.5rem;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.02), 0 8px 20px -12px #265e7a;
      margin-bottom: 1.5rem;
    }

    .parking-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
    }

    .slot-count {
      background: #1e4f6b;
      color: white;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-size: 0.8rem;
    }

    .parking-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .parking-slot {
      background: #f8fafc;
      border-radius: 16px;
      padding: 1rem 0.3rem;
      text-align: center;
      border: 2px solid #e2edf5;
      transition: all 0.2s ease;
      cursor: pointer;
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .parking-slot.occupied {
      background: linear-gradient(145deg, #fff1f0, #ffe7e3);
      border-color: #f44336;
    }

    .parking-slot.available {
      background: linear-gradient(145deg, #f0faf5, #e6f3ec);
      border-color: #4caf50;
    }

    .slot-icon {
      font-size: 2rem;
      margin-bottom: 0.3rem;
    }

    .occupied .slot-icon {
      color: #f44336;
    }

    .available .slot-icon {
      color: #4caf50;
    }

    .slot-id {
      font-size: 0.9rem;
      font-weight: 700;
      color: #1e4f6b;
    }

    .slot-status {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 30px;
      margin-top: 0.2rem;
    }

    .occupied .slot-status {
      background: #f44336;
      color: white;
    }

    .available .slot-status {
      background: #4caf50;
      color: white;
    }

    .activity-log {
      background: white;
      border-radius: 20px;
      padding: 1rem;
      max-height: 120px;
      overflow-y: auto;
      font-size: 0.8rem;
      border: 1px solid #e2edf5;
    }

    .log-title {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #1e4f6b;
    }

    .log-entry {
      padding: 0.3rem 0;
      border-bottom: 1px dashed #e2edf5;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .log-entry.entry {
      color: #4caf50;
    }

    .log-entry.exit {
      color: #f44336;
    }

    .log-time {
      color: #888;
      font-size: 0.7rem;
      margin-left: auto;
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.2rem;
    }

    .modern-btn {
      background: white;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #145c7a;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 8px 18px -6px #173f5730, 0 0 0 1px #b9d7ea inset;
      transition: all 0.2s ease;
    }

    .modern-btn i {
      font-size: 1rem;
      color: #3184a8;
    }

    .modern-btn:hover {
      background: #edf7fd;
      transform: scale(1.02);
    }

    .modern-btn.reset {
      background: #fff4f0;
      color: #ac3800;
    }

    .modern-btn.reset i {
      color: #ac3800;
    }

    .live-badge {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #34b56f;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }

    .footer-note {
      text-align: center;
      font-size: 0.7rem;
      color: #5e849c;
      margin-top: 1rem;
      padding-top: 0.8rem;
      border-top: 1px dashed #c1dae9;
    }

    .raw-data {
      background: #f0f0f0;
      padding: 0.5rem;
      border-radius: 8px;
      font-size: 0.7rem;
      margin-top: 0.5rem;
      max-height: 60px;
      overflow-y: auto;
      color: #333;
    }
  </style>
</head>
<body>
<div class="glass-panel">
  <h1>
    <i class="fas fa-square-parking"></i> 
    3x2 parking · mockapi
  </h1>

  <!-- Debug info - makikita natin kung ano ang laman ng mockapi -->
  <div class="debug-info" id="debugInfo">
    <i class="fas fa-spinner fa-spin"></i> Kinukuha ang data mula mockapi...
  </div>

  <div class="status-badge" id="statusBadge">
    <i class="fas fa-circle-check"></i> <span id="statusMessage">nagbabasa ng mockapi...</span>
  </div>

  <div class="entry-exit-grid">
    <div class="counter-card entry">
      <div class="counter-label"><i class="fas fa-sign-in-alt"></i> PUMASOK</div>
      <div class="counter-value" id="totalEntry">0</div>
    </div>
    <div class="counter-card exit">
      <div class="counter-label"><i class="fas fa-sign-out-alt"></i> LUMABAS</div>
      <div class="counter-value" id="totalExit">0</div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">TOTAL</div>
      <div class="stat-value" id="totalSlots">6</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">NAKAPARK</div>
      <div class="stat-value" id="occupiedSlots">0 <small>/6</small></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">BAKANTE</div>
      <div class="stat-value" id="availableSlots">6 <small>/6</small></div>
    </div>
  </div>

  <div class="parking-container">
    <div class="parking-title">
      <div><i class="fas fa-grid-2"></i> 3x2 Parking (6 slots)</div>
      <div class="slot-count"><i class="fas fa-car"></i> 6 slots</div>
    </div>
    
    <div class="parking-grid" id="parkingGrid">
      <!-- 6 slots -->
    </div>

    <!-- Raw data from mockapi -->
    <div class="raw-data" id="rawData">
      Naghihintay ng data...
    </div>
  </div>

  <div class="activity-log">
    <div class="log-title"><i class="fas fa-history"></i> Kamakailang Activity</div>
    <div id="logEntries">— walang activity —</div>
  </div>

  <div class="button-group">
    <button class="modern-btn" id="refreshBtn">
      <i class="fas fa-sync-alt"></i> manual refresh
    </button>
    <button class="modern-btn reset" id="resetBtn">
      <i class="fas fa-redo-alt"></i> reset counters
    </button>
  </div>

  <div class="footer-note">
    <i class="fas fa-database"></i> 3x2 = 6 slots · base sa mockapi
  </div>
</div>

<script>
  (function() {
    const API_URL = "https://698d3f03b79d1c928ed4ccbd.mockapi.io/parking";
    const TOTAL_SLOTS = 6;

    // DOM elements
    const debugInfo = document.getElementById('debugInfo');
    const rawData = document.getElementById('rawData');
    const parkingGrid = document.getElementById('parkingGrid');
    const totalSpan = document.getElementById('totalSlots');
    const occupiedSpan = document.getElementById('occupiedSlots');
    const availableSpan = document.getElementById('availableSlots');
    const totalEntrySpan = document.getElementById('totalEntry');
    const totalExitSpan = document.getElementById('totalExit');
    const statusMessage = document.getElementById('statusMessage');
    const statusBadge = document.getElementById('statusBadge');
    const logEntries = document.getElementById('logEntries');
    const refreshBtn = document.getElementById('refreshBtn');
    const resetBtn = document.getElementById('resetBtn');

    // Store previous state
    let previousOccupied = 0;
    let totalEntry = 0;
    let totalExit = 0;
    let activityLog = [];

    async function fetchParkingData() {
      try {
        // Show loading
        debugInfo.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Kinukuha ang data mula mockapi...';
        
        const response = await fetch(API_URL);
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        
        // Ipakita ang raw data para makita natin
        debugInfo.innerHTML = '✓ May data mula mockapi!';
        rawData.innerHTML = `<strong>Raw mockapi data (${data.length} items):</strong><br>` + 
                          JSON.stringify(data.slice(0, 10), null, 2)
                            .replace(/ /g, '&nbsp;')
                            .replace(/\n/g, '<br>');
        
        // Kunin lang ang unang 6
        const first6Slots = data.slice(0, TOTAL_SLOTS);
        
        // Check kung anong status values meron
        const statusValues = first6Slots.map(s => s.status).join(', ');
        debugInfo.innerHTML += `<br>Status values: ${statusValues || 'walang status'}`;
        
        // Bilangin occupied
        let currentOccupied = 0;
        first6Slots.forEach((slot, index) => {
          // I-debug kung ano ang laman ng status
          console.log(`Slot ${index + 1}:`, slot);
          
          // Check kung may status property
          if (slot.status) {
            const statusLower = String(slot.status).toLowerCase();
            if (statusLower === 'occupied' || statusLower === 'true' || statusLower === '1') {
              currentOccupied++;
            }
          }
        });
        
        // Update debug
        debugInfo.innerHTML += `<br>Occupied count: ${currentOccupied}`;
        
        // Check kung may nagbago
        if (previousOccupied !== 0) {
          if (currentOccupied > previousOccupied) {
            const diff = currentOccupied - previousOccupied;
            totalEntry += diff;
            addToLog('entry', `${diff} sasakyan`);
          } else if (currentOccupied < previousOccupied) {
            const diff = previousOccupied - currentOccupied;
            totalExit += diff;
            addToLog('exit', `${diff} sasakyan`);
          }
        }
        
        previousOccupied = currentOccupied;
        
        // Update UI
        const currentAvailable = TOTAL_SLOTS - currentOccupied;
        
        totalSpan.innerText = TOTAL_SLOTS;
        occupiedSpan.innerHTML = `${currentOccupied} <small>/ ${TOTAL_SLOTS}</small>`;
        availableSpan.innerHTML = `${currentAvailable} <small>/ ${TOTAL_SLOTS}</small>`;
        totalEntrySpan.innerText = totalEntry;
        totalExitSpan.innerText = totalExit;
        
        // Update status
        if (currentAvailable === 0) {
          statusBadge.classList.add('warning');
          statusMessage.innerHTML = '⚠️ Puno na!';
        } else {
          statusBadge.classList.remove('warning');
          statusMessage.innerHTML = `✓ ${currentAvailable} bakante · ${currentOccupied} nakapark`;
        }
        
        // Update parking grid
        parkingGrid.innerHTML = '';
        
        for (let i = 0; i < TOTAL_SLOTS; i++) {
          const slotNumber = i + 1;
          
          let isOccupied = false;
          if (i < first6Slots.length && first6Slots[i].status) {
            const status = String(first6Slots[i].status).toLowerCase();
            isOccupied = (status === 'occupied' || status === 'true' || status === '1');
          }
          
          const slotDiv = document.createElement('div');
          slotDiv.className = `parking-slot ${isOccupied ? 'occupied' : 'available'}`;
          
          slotDiv.innerHTML = `
            <div class="slot-icon">
              <i class="fas ${isOccupied ? 'fa-car' : 'fa-parking'}"></i>
            </div>
            <div class="slot-id">Slot ${slotNumber}</div>
            <div class="slot-status">${isOccupied ? 'OCCUPIED' : 'AVAILABLE'}</div>
          `;
          
          parkingGrid.appendChild(slotDiv);
        }
        
      } catch (error) {
        console.error('Error:', error);
        debugInfo.innerHTML = `❌ Error: ${error.message}`;
        rawData.innerHTML = 'Walang data mula mockapi';
        statusBadge.classList.add('warning');
        statusMessage.innerHTML = '⚠️ Error sa mockapi';
      }
    }

    function addToLog(action, details) {
      const time = new Date().toLocaleTimeString();
      
      activityLog.unshift({ time, action, details });
      
      if (activityLog.length > 5) {
        activityLog.pop();
      }
      
      // Update log
      logEntries.innerHTML = '';
      
      if (activityLog.length === 0) {
        logEntries.innerHTML = '— walang activity —';
        return;
      }
      
      activityLog.forEach(log => {
        const div = document.createElement('div');
        div.className = `log-entry ${log.action}`;
        div.innerHTML = `
          <i class="fas ${log.action === 'entry' ? 'fa-sign-in-alt' : 'fa-sign-out-alt'}"></i>
          <span>${log.action === 'entry' ? 'Pumasok' : 'Lumabas'} ${log.details}</span>
          <span class="log-time">${log.time}</span>
        `;
        logEntries.appendChild(div);
      });
    }

    function resetCounters() {
      totalEntry = 0;
      totalExit = 0;
      previousOccupied = 0;
      activityLog = [];
      
      totalEntrySpan.innerText = '0';
      totalExitSpan.innerText = '0';
      logEntries.innerHTML = '— walang activity —';
      
      fetchParkingData();
    }

    // Initial fetch
    fetchParkingData();
    
    // Auto-refresh every 3 seconds
    setInterval(fetchParkingData, 3000);
    
    // Event listeners
    refreshBtn.addEventListener('click', fetchParkingData);
    resetBtn.addEventListener('click', resetCounters);

  })();
</script>
</body>
</html>
