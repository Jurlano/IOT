<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3x2 Parking - Enter/Exit Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      width: 100%;
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    h1 i {
      color: #667eea;
    }

    .mockapi-info {
      background: #f0f4f8;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-family: monospace;
      font-size: 14px;
      overflow-x: auto;
    }

    .status-badge {
      text-align: center;
      padding: 12px;
      background: #e3f2fd;
      border-radius: 50px;
      margin-bottom: 25px;
      font-weight: bold;
      font-size: 16px;
    }

    .status-badge.warning {
      background: #ffecdd;
      color: #ac3800;
    }

    .main-counters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 25px;
    }

    .counter-box {
      background: white;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      border: 1px solid #e0e0e0;
    }

    .counter-box.enter {
      border-top: 5px solid #28a745;
    }

    .counter-box.exit {
      border-top: 5px solid #dc3545;
    }

    .counter-box .label {
      font-size: 16px;
      color: #666;
      margin-bottom: 10px;
    }

    .counter-box .label i {
      margin-right: 8px;
    }

    .counter-box .number {
      font-size: 48px;
      font-weight: bold;
      color: #333;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 25px;
    }

    .stat-card {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }

    .stat-card .label {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 24px;
      font-weight: bold;
      color: #333;
    }

    .parking-section {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 25px;
    }

    .parking-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .parking-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .parking-slot {
      background: white;
      border: 2px solid #dee2e6;
      border-radius: 12px;
      padding: 15px 5px;
      text-align: center;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .parking-slot.occupied {
      background: #f8d7da;
      border-color: #dc3545;
    }

    .parking-slot.available {
      background: #d4edda;
      border-color: #28a745;
    }

    .parking-slot i {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .parking-slot .slot-number {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 5px;
    }

    .parking-slot .slot-status {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      color: white;
      font-weight: bold;
    }

    .occupied .slot-status {
      background: #dc3545;
    }

    .available .slot-status {
      background: #28a745;
    }

    .listcar-info {
      background: #fff3cd;
      border: 1px solid #ffeeba;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .listcar-info i {
      color: #856404;
      margin-right: 8px;
    }

    .activity-log {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      max-height: 150px;
      overflow-y: auto;
    }

    .log-title {
      font-weight: bold;
      margin-bottom: 12px;
      color: #555;
    }

    .log-entry {
      padding: 8px 0;
      border-bottom: 1px dashed #e0e0e0;
      display: flex;
      justify-content: space-between;
      font-size: 13px;
    }

    .log-entry.enter {
      color: #28a745;
    }

    .log-entry.exit {
      color: #dc3545;
    }

    .log-time {
      color: #999;
      font-size: 11px;
    }

    .button-group {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
    }

    button i {
      font-size: 16px;
    }

    .btn-refresh {
      background: #667eea;
      color: white;
    }

    .btn-refresh:hover {
      background: #5a67d8;
      transform: translateY(-2px);
    }

    .btn-reset {
      background: #6c757d;
      color: white;
    }

    .btn-reset:hover {
      background: #5a6268;
      transform: translateY(-2px);
    }

    .debug-panel {
      margin-top: 20px;
      background: #1e1e2f;
      color: #0ff;
      padding: 15px;
      border-radius: 10px;
      font-family: monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <i class="fas fa-parking"></i>
      3x2 Parking Tracker
    </h1>

    <!-- Mockapi Data Display -->
    <div class="mockapi-info" id="mockapiDisplay">
      <i class="fas fa-database"></i> Naghihintay ng data...
    </div>

    <!-- Status Badge -->
    <div class="status-badge" id="statusDisplay">
      <i class="fas fa-circle-notch fa-spin"></i> Loading...
    </div>

    <!-- Enter/Exit Main Counters -->
    <div class="main-counters">
      <div class="counter-box enter">
        <div class="label">
          <i class="fas fa-sign-in-alt"></i> ENTER
        </div>
        <div class="number" id="enterCount">0</div>
      </div>
      <div class="counter-box exit">
        <div class="label">
          <i class="fas fa-sign-out-alt"></i> EXIT
        </div>
        <div class="number" id="exitCount">0</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">TOTAL OBJECTS</div>
        <div class="value" id="totalObjects">0</div>
      </div>
      <div class="stat-card">
        <div class="label">TOTAL ENTER</div>
        <div class="value" id="totalEnter">0</div>
      </div>
      <div class="stat-card">
        <div class="label">TOTAL EXIT</div>
        <div class="value" id="totalExit">0</div>
      </div>
    </div>

    <!-- Listcar Information -->
    <div class="listcar-info" id="listcarDisplay">
      <i class="fas fa-list"></i> <span>Walang listcar data</span>
    </div>

    <!-- 3x2 Parking Grid -->
    <div class="parking-section">
      <div class="parking-title">
        <span><i class="fas fa-grid-2"></i> 3x2 Parking Layout</span>
        <span class="badge" id="currentObjectId">Object ID: -</span>
      </div>
      <div class="parking-grid" id="parkingGrid">
        <!-- 6 slots will be inserted here -->
      </div>
    </div>

    <!-- Activity Log -->
    <div class="activity-log">
      <div class="log-title"><i class="fas fa-history"></i> Recent Activity</div>
      <div id="activityList">
        — walang activity —
      </div>
    </div>

    <!-- Buttons -->
    <div class="button-group">
      <button class="btn-refresh" id="refreshBtn">
        <i class="fas fa-sync-alt"></i> Refresh
      </button>
      <button class="btn-reset" id="resetBtn">
        <i class="fas fa-redo-alt"></i> Reset Counters
      </button>
    </div>

    <!-- Debug Panel -->
    <div class="debug-panel" id="debugPanel">
      Initializing...
    </div>
  </div>

  <script>
    const API_URL = 'https://698d3f03b79d1c928ed4ccbd.mockapi.io/parking';
    
    // Variables for tracking
    let previousData = [];
    let totalEnter = 0;
    let totalExit = 0;
    let activityLog = [];

    // DOM Elements
    const mockapiDisplay = document.getElementById('mockapiDisplay');
    const statusDisplay = document.getElementById('statusDisplay');
    const enterCount = document.getElementById('enterCount');
    const exitCount = document.getElementById('exitCount');
    const totalObjects = document.getElementById('totalObjects');
    const totalEnter = document.getElementById('totalEnter');
    const totalExit = document.getElementById('totalExit');
    const listcarDisplay = document.getElementById('listcarDisplay');
    const currentObjectId = document.getElementById('currentObjectId');
    const parkingGrid = document.getElementById('parkingGrid');
    const activityList = document.getElementById('activityList');
    const debugPanel = document.getElementById('debugPanel');

    // Function to add to activity log
    function addToLog(type, message) {
      const time = new Date().toLocaleTimeString();
      activityLog.unshift({ type, message, time });
      
      if (activityLog.length > 8) {
        activityLog.pop();
      }
      
      // Update activity display
      activityList.innerHTML = '';
      
      if (activityLog.length === 0) {
        activityList.innerHTML = '— walang activity —';
      } else {
        activityLog.forEach(log => {
          const entry = document.createElement('div');
          entry.className = `log-entry ${log.type}`;
          entry.innerHTML = `
            <span>
              <i class="fas ${log.type === 'enter' ? 'fa-sign-in-alt' : 'fa-sign-out-alt'}"></i>
              ${log.message}
            </span>
            <span class="log-time">${log.time}</span>
          `;
          activityList.appendChild(entry);
        });
      }
    }

    // Function to create parking slot
    function createSlot(number, isOccupied) {
      const slot = document.createElement('div');
      slot.className = `parking-slot ${isOccupied ? 'occupied' : 'available'}`;
      
      slot.innerHTML = `
        <i class="fas ${isOccupied ? 'fa-car' : 'fa-parking'}"></i>
        <div class="slot-number">Slot ${number}</div>
        <div class="slot-status">${isOccupied ? 'OCCUPIED' : 'AVAILABLE'}</div>
      `;
      
      return slot;
    }

    // Main fetch function
    async function fetchData() {
      try {
        debugPanel.innerHTML = '⏳ Fetching data from mockapi...';
        
        const response = await fetch(API_URL);
        const data = await response.json();
        
        // Display raw mockapi data
        mockapiDisplay.innerHTML = `<i class="fas fa-database"></i> ${JSON.stringify(data, null, 2)}`;
        
        // Update object count
        totalObjects.textContent = data.length;
        
        // Calculate totals
        let totalEnterValue = 0;
        let totalExitValue = 0;
        let allListcars = [];
        
        data.forEach(item => {
          // Convert string to number
          const enter = parseInt(item.enter) || 0;
          const exit = parseInt(item.exit) || 0;
          
          totalEnterValue += enter;
          totalExitValue += exit;
          
          // Collect listcar data
          if (item.listcar) {
            allListcars.push(`Obj ${item.id}: ${item.listcar}`);
          }
        });
        
        // Update total displays
        totalEnter.textContent = totalEnterValue;
        totalExit.textContent = totalExitValue;
        
        // Update listcar display
        if (allListcars.length > 0) {
          listcarDisplay.innerHTML = `<i class="fas fa-list"></i> ${allListcars.join(' | ')}`;
        }
        
        // Check for changes (entry/exit events)
        if (previousData.length > 0) {
          let enterDiff = 0;
          let exitDiff = 0;
          
          // Compare each object
          data.forEach((item, index) => {
            if (index < previousData.length) {
              const prevEnter = parseInt(previousData[index].enter) || 0;
              const currEnter = parseInt(item.enter) || 0;
              const prevExit = parseInt(previousData[index].exit) || 0;
              const currExit = parseInt(item.exit) || 0;
              
              if (currEnter > prevEnter) {
                enterDiff += (currEnter - prevEnter);
              }
              if (currExit > prevExit) {
                exitDiff += (currExit - prevExit);
              }
            }
          });
          
          if (enterDiff > 0) {
            totalEnter += enterDiff;
            addToLog('enter', `${enterDiff} new vehicle(s) entered`);
          }
          
          if (exitDiff > 0) {
            totalExit += exitDiff;
            addToLog('exit', `${exitDiff} vehicle(s) exited`);
          }
        }
        
        // Update main counters
        enterCount.textContent = totalEnter;
        exitCount.textContent = totalExit;
        
        // Update status
        statusDisplay.innerHTML = `
          <i class="fas fa-check-circle"></i> 
          ${data.length} objects · Enter: ${totalEnterValue} · Exit: ${totalExitValue}
        `;
        
        // Display first object's parking (for demo, we'll show 6 slots)
        if (data.length > 0) {
          const firstItem = data[0];
          currentObjectId.textContent = `Object ID: ${firstItem.id}`;
          
          // For demo, let's assume occupied = enter mod 6
          // Para may display tayo sa parking grid
          const occupiedCount = (parseInt(firstItem.enter) || 0) % 6;
          
          // Clear and populate parking grid
          parkingGrid.innerHTML = '';
          
          for (let i = 0; i < 6; i++) {
            const isOccupied = i < occupiedCount;
            const slot = createSlot(i + 1, isOccupied);
            parkingGrid.appendChild(slot);
          }
        }
        
        // Update debug panel
        debugPanel.innerHTML = `✓ Data loaded successfully
Objects: ${data.length}
Previous objects: ${previousData.length}
Total Enter Events: ${totalEnter}
Total Exit Events: ${totalExit}`;
        
        // Save current data for next comparison
        previousData = [...data];
        
      } catch (error) {
        debugPanel.innerHTML = `❌ Error: ${error.message}`;
        statusDisplay.innerHTML = `❌ Failed to load data`;
      }
    }

    // Reset counters
    function resetCounters() {
      totalEnter = 0;
      totalExit = 0;
      activityLog = [];
      
      enterCount.textContent = '0';
      exitCount.textContent = '0';
      activityList.innerHTML = '— walang activity —';
      
      fetchData(); // Refresh data
    }

    // Initial fetch
    fetchData();
    
    // Auto-refresh every 3 seconds
    setInterval(fetchData, 3000);
    
    // Event listeners
    document.getElementById('refreshBtn').addEventListener('click', fetchData);
    document.getElementById('resetBtn').addEventListener('click', resetCounters);

  </script>
</body>
</html>
