<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      text-align: center;
      width: 100%;
      max-width: 380px;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #00bcd4, #667eea);
    }

    h1 {
      margin-bottom: 30px;
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .stats-wrapper {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: linear-gradient(145deg, #f8fafc, #ffffff);
      padding: 20px;
      border-radius: 16px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
    }

    .stat-label {
      font-size: 13px;
      color: #64748b;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 800;
      color: #1e293b;
      line-height: 1;
    }

    .stat-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .alert {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      padding: 16px;
      margin: 20px 0;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      display: none;
      animation: slideIn 0.3s ease-out;
      box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    button {
      background: linear-gradient(135deg, #00bcd4 0%, #0097a7 100%);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      width: 100%;
      transition: all 0.3s;
      box-shadow: 0 4px 6px -1px rgba(0, 188, 212, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(0, 188, 212, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .refresh-icon {
      font-size: 18px;
      transition: transform 0.3s;
    }

    button:hover .refresh-icon {
      transform: rotate(180deg);
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>⚡ Parking Tracker</h1>
    
    <div class="stats-wrapper">
      <div class="stat-card">
        <div class="stat-icon">🅿️</div>
        <div class="stat-label">Vehicles Inside</div>
        <div class="stat-value" id="inside">0</div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">🚙</div>
        <div class="stat-label">Vehicles Exited</div>
        <div class="stat-value" id="exit">0</div>
      </div>
    </div>

    <div class="alert" id="alert">⚠️ Parking Full! Over Capacity!</div>
    
    <button onclick="fetchParkingData()" id="refreshBtn">
      <span class="refresh-icon">🔄</span>
      <span>Refresh Data</span>
    </button>
  </div>

  <script>
    const API_URL = 'https://698d3f03b79d1c928ed4ccbd.mockapi.io/parking';
    const MAX_CAPACITY = 6;

    async function fetchParkingData() {
      const btn = document.getElementById('refreshBtn');
      const originalContent = btn.innerHTML;
      
      // Show loading state
      btn.innerHTML = '<span class="loading"></span> Loading...';
      btn.disabled = true;

      try {
        const response = await fetch(API_URL);
        const data = await response.json();

        let totalInside = 0;
        let totalExited = 0;

        data.forEach(entry => {
          totalInside += parseInt(entry.occupied) || 0;
          totalExited += parseInt(entry.available) || 0;
        });

        // Animate numbers
        animateValue('inside', parseInt(document.getElementById('inside').textContent), totalInside);
        animateValue('exit', parseInt(document.getElementById('exit').textContent), totalExited);

        const alertBox = document.getElementById('alert');
        if (totalInside > MAX_CAPACITY) {
          alertBox.style.display = 'block';
        } else {
          alertBox.style.display = 'none';
        }

      } catch (error) {
        console.error('Error fetching data:', error);
        alert('Failed to fetch parking data');
      } finally {
        // Restore button
        btn.innerHTML = originalContent;
        btn.disabled = false;
      }
    }

    function animateValue(id, start, end) {
      if (start === end) return;
      const obj = document.getElementById(id);
      const range = end - start;
      const duration = 500;
      const startTime = performance.now();

      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const easeProgress = 1 - Math.pow(1 - progress, 3);
        const current = Math.round(start + (range * easeProgress));
        obj.textContent = current;
        
        if (progress < 1) {
          requestAnimationFrame(update);
        }
      }
      
      requestAnimationFrame(update);
    }

    // Fetch on page load
    fetchParkingData();
  </script>

</body>
</html>
