<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>modern parking · flow dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #e9f0f9 0%, #f5f9ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .glass-panel {
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 2.2rem 2rem;
      box-shadow: 0 30px 60px -20px rgba(0, 40, 80, 0.35),
                  inset 0 1px 2px rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.5);
    }

    h1 {
      font-weight: 600;
      font-size: 2.2rem;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #112b3f;
      margin-bottom: 1rem;
    }

    h1 i {
      background: #1e4f6b;
      color: white;
      padding: 12px;
      border-radius: 30px;
      font-size: 1.5rem;
      box-shadow: 0 8px 18px -6px #1e4f6b70;
    }

    .status-badge {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 500;
      padding: 0.8rem 1.5rem;
      border-radius: 100px;
      width: fit-content;
      margin: 0.5rem auto 1.8rem auto;
      background: #edf6fc;
      color: #0b4b6b;
      border: 1px solid #c2dcf0;
      box-shadow: 0 2px 8px rgba(0,50,80,0.05);
      transition: all 0.2s ease;
    }

    .status-badge i {
      margin-right: 8px;
      font-size: 1.2rem;
    }

    .status-badge.warning {
      background: #ffecdd;
      color: #ac3800;
      border-color: #ffb68b;
    }

    .stats-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      margin: 2rem 0 2.5rem 0;
    }

    .stat-card {
      background: white;
      border-radius: 34px;
      padding: 1.2rem 2.2rem;
      min-width: 170px;
      text-align: center;
      box-shadow: 0 15px 30px -12px rgba(21, 50, 80, 0.15);
      border: 1px solid rgba(0,150,200,0.15);
      transition: all 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      border-color: #2aa7c9;
    }

    .stat-label {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 600;
      color: #42758e;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: #0f3b4f;
      line-height: 1.2;
    }

    .stat-value small {
      font-size: 1rem;
      font-weight: 400;
      color: #608a9f;
    }

    .table-container {
      background: rgba(255,255,255,0.6);
      border-radius: 28px;
      padding: 0.2rem 0.2rem 0.2rem 0.2rem;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.02), 0 8px 20px -12px #265e7a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 26px;
      overflow: hidden;
    }

    th {
      background: #173f57;
      color: white;
      font-weight: 500;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      padding: 1.1rem 0.8rem;
      text-align: center;
    }

    th i {
      margin-right: 6px;
      opacity: 0.8;
    }

    td {
      padding: 1rem 0.6rem;
      text-align: center;
      background: white;
      border-bottom: 1px solid #e2edf5;
      font-weight: 500;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .row-status-chip {
      display: inline-block;
      padding: 0.4rem 1.1rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      background: #e9f2f9;
      color: #0a4055;
      min-width: 90px;
    }

    tr.available td:first-child {
      border-left: 6px solid #0e9f6e;
    }
    tr.available .row-status-chip {
      background: #dff3e8;
      color: #0b6e47;
    }

    tr.full td:first-child {
      border-left: 6px solid #d6493b;
    }
    tr.full .row-status-chip {
      background: #ffe7e3;
      color: #b13a2c;
    }

    td:nth-child(2), td:nth-child(3) {
      font-weight: 600;
    }

    .refresh-action {
      display: flex;
      justify-content: center;
      margin: 2.2rem 0 0.2rem 0;
    }

    .modern-btn {
      background: white;
      border: none;
      padding: 0.9rem 2.4rem;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #145c7a;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      box-shadow: 0 8px 18px -6px #173f5730, 0 0 0 1px #b9d7ea inset;
      transition: all 0.2s ease;
    }

    .modern-btn i {
      font-size: 1.2rem;
      color: #3184a8;
    }

    .modern-btn:hover {
      background: #edf7fd;
      box-shadow: 0 12px 24px -8px #1f5979, 0 0 0 1px #7bc0db inset;
      transform: scale(1.02);
    }

    .modern-btn:active {
      transform: scale(0.98);
    }

    .footer-note {
      text-align: center;
      font-size: 0.8rem;
      color: #5e849c;
      margin-top: 1.2rem;
      border-top: 1px dashed #c1dae9;
      padding-top: 1rem;
      opacity: 0.7;
    }

    .live-badge {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #34b56f;
      border-radius: 50%;
      margin-right: 6px;
      box-shadow: 0 0 0 2px #a3e0c0;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
<div class="glass-panel">
  <h1>
    <i class="fas fa-square-parking"></i> 
    park<span style="font-weight:300;">·flow</span>
    <i class="fas fa-wave-square" style="background:transparent; color:#1e4f6b; box-shadow:none; font-size:1.9rem;"></i>
  </h1>

  <div class="status-badge" id="statusBadge">
    <i class="fas fa-circle-check"></i> <span id="statusMessage">all systems live</span>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label"><i class="fas fa-layer-group" style="margin-right:6px;"></i>total slots</div>
      <div class="stat-value" id="totalSlots">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label"><i class="fas fa-car-side"></i> occupied</div>
      <div class="stat-value" id="occupiedSlots">0 <small>/ 0</small></div>
    </div>
    <div class="stat-card">
      <div class="stat-label"><i class="fas fa-arrow-circle-up"></i> available</div>
      <div class="stat-value" id="availableSlots">0 <small>/ 0</small></div>
    </div>
  </div>

  <div class="table-container">
    <table id="parkingTable">
      <thead>
        <tr>
          <th><i class="fas fa-hashtag"></i> Lot ID</th>
          <th><i class="fas fa-wheelchair"></i> Occupied</th>
          <th><i class="fas fa-check-circle"></i> Available</th>
          <th><i class="fas fa-flag"></i> Status</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- dynamic rows injected via JS -->
      </tbody>
    </table>
  </div>

  <div class="refresh-action">
    <button class="modern-btn" id="refreshBtn">
      <i class="fas fa-sync-alt"></i> update now
      <span class="live-badge"></span>
    </button>
  </div>
  <div class="footer-note">
    <i class="fas fa-bolt" style="margin-right:6px;"></i> live sync · 3s interval · mockAPI
  </div>
</div>

<script>
  (function() {
    const API_URL = "https://698d3f03b79d1c928ed4ccbd.mockapi.io/parking";

    const tbody = document.getElementById("tableBody");
    const totalSpan = document.getElementById("totalSlots");
    const occupiedSpan = document.getElementById("occupiedSlots");
    const availableSpan = document.getElementById("availableSlots");
    const statusBadge = document.getElementById("statusBadge");
    const refreshBtn = document.getElementById("refreshBtn");

    async function fetchParkingData() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        tbody.innerHTML = "";

        // Since the API returns 60 individual slot objects, we need to count them properly
        let totalSlots = data.length; // This will be 60
        let totalOccupied = 0;
        
        // Count occupied slots (where status is "occupied" or similar)
        data.forEach(item => {
          // Check if the slot is occupied based on status field
          // The API might use different status values
          if (item.status && item.status.toLowerCase() === "occupied") {
            totalOccupied++;
          }
        });
        
        let totalAvailable = totalSlots - totalOccupied;

        // Update summary cards
        totalSpan.innerText = totalSlots;
        occupiedSpan.innerHTML = `${totalOccupied} <small>/ ${totalSlots}</small>`;
        availableSpan.innerHTML = `${totalAvailable} <small>/ ${totalSlots}</small>`;

        // Display each parking slot in the table
        data.forEach((item, index) => {
          const tr = document.createElement("tr");
          
          // Determine if this slot is occupied
          const isOccupied = item.status && item.status.toLowerCase() === "occupied";
          const slotStatus = isOccupied ? "Occupied" : "Available";
          
          // Set row class
          if (isOccupied) {
            tr.classList.add("full");
          } else {
            tr.classList.add("available");
          }

          // For occupied/available counts, we show 1 or 0 since each slot is individual
          const occupiedCount = isOccupied ? 1 : 0;
          const availableCount = isOccupied ? 0 : 1;

          tr.innerHTML = `
            <td><span style="font-weight:600; background:#eef4f9; padding:0.3rem 0.9rem; border-radius:30px;">${item.id || index + 1}</span></td>
            <td><span style="background:${isOccupied ? '#fbebea' : '#f0f7fa'}; padding:0.3rem 1rem; border-radius:40px;">${occupiedCount}</span></td>
            <td><span style="background:${!isOccupied ? '#def5e8' : '#f2e4e2'}; padding:0.3rem 1rem; border-radius:40px;">${availableCount}</span></td>
            <td><span class="row-status-chip">${slotStatus}</span></td>
          `;

          tbody.appendChild(tr);
        });

        // Update status badge
        if (totalAvailable === 0) {
          statusBadge.classList.add("warning");
          statusBadge.innerHTML = `<i class="fas fa-exclamation-triangle"></i> <span id="statusMessage">⚠️ parking full · no spots left</span>`;
        } else {
          statusBadge.classList.remove("warning");
          statusBadge.innerHTML = `<i class="fas fa-circle-check"></i> <span id="statusMessage">✓ ${totalAvailable} spot${totalAvailable !== 1 ? 's' : ''} available · ready</span>`;
        }

      } catch (error) {
        console.warn("fetch error", error);
        tbody.innerHTML = `<tr><td colspan="4" style="padding:2rem; background:white; border-radius:20px; color:#b13a2c;"><i class="fas fa-plug"></i> unable to reach server — using demo snapshot</td></tr>`;
        
        statusBadge.classList.add("warning");
        statusBadge.innerHTML = `<i class="fas fa-wifi-slash"></i> <span>offline mode · stale data</span>`;
      }
    }

    // Initial fetch
    fetchParkingData();

    // Set live interval (3 sec)
    const intervalId = setInterval(fetchParkingData, 3000);

    // Refresh button click
    refreshBtn.addEventListener("click", (e) => {
      e.preventDefault();
      fetchParkingData();
      const icon = refreshBtn.querySelector("i");
      icon.style.transition = "transform 0.3s";
      icon.style.transform = "rotate(180deg)";
      setTimeout(() => {
        icon.style.transform = "rotate(0deg)";
      }, 200);
    });

    window.addEventListener('beforeunload', () => {
      clearInterval(intervalId);
    });

  })();
</script>
</body>
</html>
