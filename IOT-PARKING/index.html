<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking System Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .parking-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .parking-lot {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        .parking-lot h2 {
            margin-bottom: 15px;
        }
        .parking-lot p {
            font-size: 18px;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <h1>Parking System Status</h1>
    <div class="parking-container" id="parkingContainer">
        <!-- Parking lots will be loaded here -->
    </div>

    <script>
        const MOCKAPI_URL = "https://698d3f03b79d1c928ed4ccbd.mockapi.io/:endpoint";

        async function fetchParkingData() {
            try {
                const response = await fetch(MOCKAPI_URL);
                const data = await response.json();

                const container = document.getElementById('parkingContainer');
                container.innerHTML = ""; // clear previous data

                data.forEach(lot => {
                    const lotDiv = document.createElement('div');
                    lotDiv.className = 'parking-lot';
                    lotDiv.innerHTML = `
                        <h2>Lot ID: ${lot.id}</h2>
                        <p>Occupied: ${lot.occupied}</p>
                        <p>Available: ${lot.available}</p>
                        <p>Status: ${lot.status}</p>
                    `;
                    container.appendChild(lotDiv);
                });

            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        // Fetch data every 5 seconds
        fetchParkingData();
        setInterval(fetchParkingData, 5000);
    </script>
</body>
</html>
